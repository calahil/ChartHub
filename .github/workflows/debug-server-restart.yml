name: Debug Server Restart (production)

on:
  workflow_dispatch:

jobs:
  debug-restart:
    name: Debug SSH restart on production device
    runs-on: ubuntu-latest
    environment: server-production
    steps:
      - name: Diagnose Tailscale secret
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "${TS_KEY}" ]; then
            echo "::error::TAILSCALE_AUTHKEY is EMPTY"
            exit 1
          fi
          echo "TAILSCALE_AUTHKEY length: ${#TS_KEY}"
          echo "TAILSCALE_AUTHKEY prefix: ${TS_KEY:0:8}..."

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$EFFECTIVE_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Probe SSH (should succeed)
        env:
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            echo \"ssh-ok, running as: \$(whoami), uid: \$(id -u)\"
            echo \"service user: \$(systemctl show charthub-server.service --property=User --value 2>/dev/null || echo unknown)\"
            echo \"KillUserProcesses: \$(loginctl show-session -p KillProcesses 2>/dev/null || grep -i killuserprocesses /etc/systemd/logind.conf 2>/dev/null || echo not-found)\"
          "

      - name: Probe - sudo systemctl is-active (no restart)
        env:
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            sudo systemctl is-active --quiet charthub-server.service 2>/dev/null && echo 'is-active: yes' || echo 'is-active: no'
            sudo systemctl is-enabled --quiet charthub-server.service 2>/dev/null && echo 'is-enabled: yes' || echo 'is-enabled: no'
            echo 'sudo-query-done'
          "

      - name: Probe - sudo systemd-run no-block echo (no restart)
        env:
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            sudo systemd-run --no-block echo systemd-run-ok
            echo 'systemd-run-done'
          "

      - name: Restart server service (verbose)
        env:
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          ssh -v -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            if sudo systemctl is-active --quiet charthub-server.service 2>/dev/null || \
               sudo systemctl is-enabled --quiet charthub-server.service 2>/dev/null; then
              # systemd-run --no-block schedules the restart as a transient unit outside
              # the SSH session cgroup, preventing systemd from killing the SSH process
              # when it tears down the restarting service's scope.
              sudo systemd-run --no-block systemctl restart charthub-server.service
              echo 'Systemd mode: restart scheduled via systemd-run'
            else
              pkill -f 'ChartHub.Server' || true
              echo 'Kiosk mode: sent SIGTERM to ChartHub.Server'
            fi
          "

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
