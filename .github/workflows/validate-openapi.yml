name: Validate OpenAPI

on:
  pull_request:
    paths:
      - openapi.yaml
      - docs/swagger-ui.html
      - README.md
      - ChartHub/Services/IngestionSyncApiHost.cs
  push:
    branches: [ main ]
    paths:
      - openapi.yaml
      - docs/swagger-ui.html
      - README.md
      - ChartHub/Services/IngestionSyncApiHost.cs

jobs:
  lint-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Redocly CLI
        run: npm install --global @redocly/cli

      - name: Lint OpenAPI document
        run: redocly lint openapi.yaml
