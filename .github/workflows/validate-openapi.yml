name: Validate OpenAPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'openapi.yaml'
  pull_request:
    paths:
      - 'openapi.yaml'

jobs:
  lint-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint OpenAPI document
        run: npx --yes @redocly/cli@latest lint openapi.yaml
