name: Validate OpenAPI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'ChartHub.Server/Endpoints/**'
      - 'ChartHub.Server/Contracts/**'
      - 'ChartHub.Server/Program.cs'
  pull_request:
    paths:
      - 'ChartHub.Server/Endpoints/**'
      - 'ChartHub.Server/Contracts/**'
      - 'ChartHub.Server/Program.cs'

jobs:
  lint-openapi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChartHub.Server/ChartHub.Server.csproj

      - name: Build
        run: dotnet build ChartHub.Server/ChartHub.Server.csproj --configuration Release --no-restore

      - name: Lint OpenAPI document
        run: npx --yes @redocly/cli@latest lint ChartHub.Server/obj/ChartHub.Server.json
