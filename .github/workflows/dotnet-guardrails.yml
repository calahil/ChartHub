name: Dotnet Guardrails

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  guardrails:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChartHub.sln

      - name: Fail on warning suppressions
        run: |
          if rg -n '#pragma warning disable|SuppressMessage' \
            --glob '!ChartHub/obj/**' \
            --glob '!ChartHub/bin/**' \
            --glob '!ChartHub/Models/APIRootResponse.cs' \
            ChartHub ChartHub.Tests; then
            echo "Warning suppressions found. These require explicit review."
            exit 1
          fi

      - name: Verify formatting
        run: dotnet format ChartHub.sln --verify-no-changes --severity error --no-restore

      - name: Build
        run: dotnet build ChartHub.sln --configuration Release --no-restore

      - name: Test with coverage threshold
        run: >-
          dotnet test ChartHub.Tests/ChartHub.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutput=./TestResults/Coverage/
          /p:CoverletOutputFormat=cobertura
          /p:Threshold=70
          /p:ThresholdType=line
          /p:ThresholdStat=total
