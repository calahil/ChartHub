name: Deploy

on:
  workflow_call:
    inputs:
      image_tag:
        description: Semantic version of the image to deploy (without v prefix, e.g. 1.2.3)
        required: true
        type: string
      image_registry:
        description: GHCR registry path including owner (e.g. ghcr.io/yourname)
        required: true
        type: string

permissions:
  packages: read

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: [self-hosted, linux, charthub-host]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Write env file
        env:
          BACKUP_API_IMAGE: ${{ inputs.image_registry }}/charthub-backup-api:${{ inputs.image_tag }}
          NAME: ${{ secrets.PSQL_CONTAINER_NAME }}
          PSQL_USER: ${{ secrets.PSQL_USER }}
          PSQL_PASSWORD: ${{ secrets.PSQL_PASSWORD }}
          PSQL_DB: ${{ secrets.PSQL_DB }}
          INTERNAL: ${{ secrets.INTERNAL }}
          API_PORT: ${{ secrets.API_PORT }}
          BACKUP_API_CONTAINER_NAME: charthub-dev-backup-api
          BACKUP_DOWNLOADS_HOST_PATH: ${{ secrets.BACKUP_DOWNLOADS_HOST_PATH }}
          BACKUP_IMAGES_HOST_PATH: ${{ secrets.BACKUP_IMAGES_HOST_PATH }}
          RHYTHMVERSE_TOKEN: ${{ secrets.RHYTHMVERSE_TOKEN }}
          BACKUP_SYNC_ENABLED: ${{ secrets.BACKUP_SYNC_ENABLED }}
        run: |
          printenv BACKUP_API_IMAGE     | xargs -I{} printf 'BACKUP_API_IMAGE=%s\n'     "{}" > .env.deploy
          printenv NAME                 | xargs -I{} printf 'NAME=%s\n'                 "{}" >> .env.deploy
          printenv PSQL_USER            | xargs -I{} printf 'PSQL_USER=%s\n'            "{}" >> .env.deploy
          printenv PSQL_PASSWORD        | xargs -I{} printf 'PSQL_PASSWORD=%s\n'        "{}" >> .env.deploy
          printenv PSQL_DB              | xargs -I{} printf 'PSQL_DB=%s\n'              "{}" >> .env.deploy
          printenv INTERNAL             | xargs -I{} printf 'INTERNAL=%s\n'             "{}" >> .env.deploy
          printenv API_PORT             | xargs -I{} printf 'API_PORT=%s\n'             "{}" >> .env.deploy
          printenv BACKUP_API_CONTAINER_NAME | xargs -I{} printf 'BACKUP_API_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_DOWNLOADS_HOST_PATH | xargs -I{} printf 'BACKUP_DOWNLOADS_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv BACKUP_IMAGES_HOST_PATH    | xargs -I{} printf 'BACKUP_IMAGES_HOST_PATH=%s\n'    "{}" >> .env.deploy
          printenv RHYTHMVERSE_TOKEN    | xargs -I{} printf 'RHYTHMVERSE_TOKEN=%s\n'    "{}" >> .env.deploy
          printenv BACKUP_SYNC_ENABLED  | xargs -I{} printf 'BACKUP_SYNC_ENABLED=%s\n' "{}" >> .env.deploy

      - name: Pull image
        run: >-
          docker compose
          --project-name charthub-dev
          --env-file .env.deploy
          pull backup-api

      - name: Deploy stack
        run: >-
          docker compose
          --project-name charthub-dev
          --env-file .env.deploy
          up -d

      - name: Verify health
        env:
          API_PORT: ${{ secrets.API_PORT }}
        run: |
          echo "Waiting for API to become healthy on port ${API_PORT}..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://localhost:${API_PORT}/health" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed (attempt ${i})"
              break
            fi
            if [[ $i -eq 12 ]]; then
              echo "Health check failed after 60s (last status: ${STATUS})"
              exit 1
            fi
            sleep 5
          done
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://localhost:${API_PORT}/api/rhythmverse/health/sync" 2>/dev/null || echo "000")
          if [[ "$HTTP" != "200" ]]; then
            echo "Sync health check failed (status: ${HTTP})"
            exit 1
          fi
          echo "All health checks passed for dev"

      - name: Clean up env file
        if: always()
        run: rm -f .env.deploy

  deploy-staging:
    name: Deploy to staging
    runs-on: [self-hosted, linux, charthub-host]
    needs: deploy-dev
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Write env file
        env:
          BACKUP_API_IMAGE: ${{ inputs.image_registry }}/charthub-backup-api:${{ inputs.image_tag }}
          NAME: ${{ secrets.PSQL_CONTAINER_NAME }}
          PSQL_USER: ${{ secrets.PSQL_USER }}
          PSQL_PASSWORD: ${{ secrets.PSQL_PASSWORD }}
          PSQL_DB: ${{ secrets.PSQL_DB }}
          INTERNAL: ${{ secrets.INTERNAL }}
          API_PORT: ${{ secrets.API_PORT }}
          BACKUP_API_CONTAINER_NAME: charthub-staging-backup-api
          BACKUP_DOWNLOADS_HOST_PATH: ${{ secrets.BACKUP_DOWNLOADS_HOST_PATH }}
          BACKUP_IMAGES_HOST_PATH: ${{ secrets.BACKUP_IMAGES_HOST_PATH }}
          RHYTHMVERSE_TOKEN: ${{ secrets.RHYTHMVERSE_TOKEN }}
          BACKUP_SYNC_ENABLED: ${{ secrets.BACKUP_SYNC_ENABLED }}
        run: |
          printenv BACKUP_API_IMAGE     | xargs -I{} printf 'BACKUP_API_IMAGE=%s\n'     "{}" > .env.deploy
          printenv NAME                 | xargs -I{} printf 'NAME=%s\n'                 "{}" >> .env.deploy
          printenv PSQL_USER            | xargs -I{} printf 'PSQL_USER=%s\n'            "{}" >> .env.deploy
          printenv PSQL_PASSWORD        | xargs -I{} printf 'PSQL_PASSWORD=%s\n'        "{}" >> .env.deploy
          printenv PSQL_DB              | xargs -I{} printf 'PSQL_DB=%s\n'              "{}" >> .env.deploy
          printenv INTERNAL             | xargs -I{} printf 'INTERNAL=%s\n'             "{}" >> .env.deploy
          printenv API_PORT             | xargs -I{} printf 'API_PORT=%s\n'             "{}" >> .env.deploy
          printenv BACKUP_API_CONTAINER_NAME | xargs -I{} printf 'BACKUP_API_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_DOWNLOADS_HOST_PATH | xargs -I{} printf 'BACKUP_DOWNLOADS_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv BACKUP_IMAGES_HOST_PATH    | xargs -I{} printf 'BACKUP_IMAGES_HOST_PATH=%s\n'    "{}" >> .env.deploy
          printenv RHYTHMVERSE_TOKEN    | xargs -I{} printf 'RHYTHMVERSE_TOKEN=%s\n'    "{}" >> .env.deploy
          printenv BACKUP_SYNC_ENABLED  | xargs -I{} printf 'BACKUP_SYNC_ENABLED=%s\n' "{}" >> .env.deploy

      - name: Pull image
        run: >-
          docker compose
          --project-name charthub-staging
          --env-file .env.deploy
          pull backup-api

      - name: Deploy stack
        run: >-
          docker compose
          --project-name charthub-staging
          --env-file .env.deploy
          up -d

      - name: Verify health
        env:
          API_PORT: ${{ secrets.API_PORT }}
        run: |
          echo "Waiting for API to become healthy on port ${API_PORT}..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://localhost:${API_PORT}/health" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed (attempt ${i})"
              break
            fi
            if [[ $i -eq 12 ]]; then
              echo "Health check failed after 60s (last status: ${STATUS})"
              exit 1
            fi
            sleep 5
          done
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://localhost:${API_PORT}/api/rhythmverse/health/sync" 2>/dev/null || echo "000")
          if [[ "$HTTP" != "200" ]]; then
            echo "Sync health check failed (status: ${HTTP})"
            exit 1
          fi
          echo "All health checks passed for staging"

      - name: Clean up env file
        if: always()
        run: rm -f .env.deploy

  deploy-production:
    name: Deploy to production
    runs-on: [self-hosted, linux, charthub-host]
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Write env file
        env:
          BACKUP_API_IMAGE: ${{ inputs.image_registry }}/charthub-backup-api:${{ inputs.image_tag }}
          NAME: ${{ secrets.PSQL_CONTAINER_NAME }}
          PSQL_USER: ${{ secrets.PSQL_USER }}
          PSQL_PASSWORD: ${{ secrets.PSQL_PASSWORD }}
          PSQL_DB: ${{ secrets.PSQL_DB }}
          INTERNAL: ${{ secrets.INTERNAL }}
          API_PORT: ${{ secrets.API_PORT }}
          BACKUP_API_CONTAINER_NAME: charthub-prod-backup-api
          BACKUP_DOWNLOADS_HOST_PATH: ${{ secrets.BACKUP_DOWNLOADS_HOST_PATH }}
          BACKUP_IMAGES_HOST_PATH: ${{ secrets.BACKUP_IMAGES_HOST_PATH }}
          RHYTHMVERSE_TOKEN: ${{ secrets.RHYTHMVERSE_TOKEN }}
          BACKUP_SYNC_ENABLED: ${{ secrets.BACKUP_SYNC_ENABLED }}
        run: |
          printenv BACKUP_API_IMAGE     | xargs -I{} printf 'BACKUP_API_IMAGE=%s\n'     "{}" > .env.deploy
          printenv NAME                 | xargs -I{} printf 'NAME=%s\n'                 "{}" >> .env.deploy
          printenv PSQL_USER            | xargs -I{} printf 'PSQL_USER=%s\n'            "{}" >> .env.deploy
          printenv PSQL_PASSWORD        | xargs -I{} printf 'PSQL_PASSWORD=%s\n'        "{}" >> .env.deploy
          printenv PSQL_DB              | xargs -I{} printf 'PSQL_DB=%s\n'              "{}" >> .env.deploy
          printenv INTERNAL             | xargs -I{} printf 'INTERNAL=%s\n'             "{}" >> .env.deploy
          printenv API_PORT             | xargs -I{} printf 'API_PORT=%s\n'             "{}" >> .env.deploy
          printenv BACKUP_API_CONTAINER_NAME | xargs -I{} printf 'BACKUP_API_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_DOWNLOADS_HOST_PATH | xargs -I{} printf 'BACKUP_DOWNLOADS_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv BACKUP_IMAGES_HOST_PATH    | xargs -I{} printf 'BACKUP_IMAGES_HOST_PATH=%s\n'    "{}" >> .env.deploy
          printenv RHYTHMVERSE_TOKEN    | xargs -I{} printf 'RHYTHMVERSE_TOKEN=%s\n'    "{}" >> .env.deploy
          printenv BACKUP_SYNC_ENABLED  | xargs -I{} printf 'BACKUP_SYNC_ENABLED=%s\n' "{}" >> .env.deploy

      - name: Pull image
        run: >-
          docker compose
          --project-name charthub-prod
          --env-file .env.deploy
          pull backup-api

      - name: Deploy stack
        run: >-
          docker compose
          --project-name charthub-prod
          --env-file .env.deploy
          up -d

      - name: Verify health
        env:
          API_PORT: ${{ secrets.API_PORT }}
        run: |
          echo "Waiting for API to become healthy on port ${API_PORT}..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://localhost:${API_PORT}/health" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed (attempt ${i})"
              break
            fi
            if [[ $i -eq 12 ]]; then
              echo "Health check failed after 60s (last status: ${STATUS})"
              exit 1
            fi
            sleep 5
          done
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            "http://localhost:${API_PORT}/api/rhythmverse/health/sync" 2>/dev/null || echo "000")
          if [[ "$HTTP" != "200" ]]; then
            echo "Sync health check failed (status: ${HTTP})"
            exit 1
          fi
          echo "All health checks passed for production"

      - name: Write deployment summary
        env:
          VERSION: ${{ inputs.image_tag }}
          REPO_OWNER: ${{ github.actor }}
        run: |
          {
            echo "## Deployment complete: ${VERSION}"
            echo "- Actor: ${REPO_OWNER}"
            echo "- Time: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up env file
        if: always()
        run: rm -f .env.deploy
