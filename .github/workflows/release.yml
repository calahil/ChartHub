  deploy-server-dev:
    name: Deploy ChartHub Server bundle to dev
    if: needs.classify.outputs.release_channel == 'dev'
    runs-on: ubuntu-latest
    needs: [classify, build-server-bundle]
    environment: server-dev
    steps:
      - uses: actions/checkout@v4

      - name: Download Server Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: server-linux-x64
          path: ./.server-release

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_DEPLOY_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$EFFECTIVE_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare install directories
        env:
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
          CONFIG_PATH: ${{ secrets.CHARTHUB_SERVER_CONFIG_PATH }}
          DATA_PATH: ${{ secrets.CHARTHUB_SERVER_DATA_PATH }}
          DB_PATH: ${{ secrets.CHARTHUB_SERVER_DB_PATH }}
          LOGS_PATH: ${{ secrets.CHARTHUB_SERVER_LOGS_PATH }}
          MUSIC_PATH: ${{ secrets.CHARTHUB_SERVER_CLONEHERO_PATH }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          EFFECTIVE_CONFIG="${CONFIG_PATH:-/srv/appdata/charthub/config}"
          EFFECTIVE_DATA="${DATA_PATH:-/srv/appdata/charthub/data}"
          EFFECTIVE_DB="$(dirname "${DB_PATH:-/srv/appdata/charthub/db/charthub.db}")"
          EFFECTIVE_LOGS="${LOGS_PATH:-/srv/appdata/charthub/logs}"
          EFFECTIVE_MUSIC="${MUSIC_PATH:-/srv/appdata/charthub/music}"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            mkdir -p \"$(dirname "$EFFECTIVE_CONFIG")/releases\"
            mkdir -p \"$EFFECTIVE_CONFIG\"
            mkdir -p \"$EFFECTIVE_DB\"
            mkdir -p \"$EFFECTIVE_LOGS\"
            mkdir -p \"$EFFECTIVE_DATA\"
            mkdir -p \"$EFFECTIVE_MUSIC\"
            chmod 777 \"$EFFECTIVE_LOGS\"
            chmod 777 \"$EFFECTIVE_DATA\"
            chmod 777 \"$EFFECTIVE_DB\"
            chmod 777 \"$EFFECTIVE_MUSIC\"
          "

      - name: Write runtime environment file
        env:
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
          AUTH_JWT_SIGNING_KEY: ${{ secrets.CHARTHUB_SERVER_JWT_SIGNING_KEY }}
          AUTH_ISSUER: ${{ secrets.CHARTHUB_SERVER_JWT_ISSUER }}
          AUTH_AUDIENCE: ${{ secrets.CHARTHUB_SERVER_JWT_AUDIENCE }}
          AUTH_ALLOWED_EMAIL: ${{ secrets.CHARTHUB_SERVER_JWT_ALLOWED_EMAILS }}
          GOOGLE_ALLOWED_AUDIENCE: ${{ secrets.CHARTHUB_SERVER_GOOGLE_ALLOWED_AUDIENCES }}
          GOOGLE_DRIVE_API_KEY: ${{ secrets.CHARTHUB_SERVER_GOOGLE_DRIVE_API_KEY }}
          CHARTHUB_SERVER_PORT: ${{ secrets.CHARTHUB_SERVER_CHARTHUB_PORT }}
          SERVER_CONFIG_PATH: ${{ secrets.CHARTHUB_SERVER_CONFIG_PATH }}
          SERVER_DATA_PATH: ${{ secrets.CHARTHUB_SERVER_DATA_PATH }}
          SERVER_DOWNLOADS_PATH: ${{ secrets.CHARTHUB_SERVER_DOWNLOADS_PATH }}
          SERVER_STAGING_PATH: ${{ secrets.CHARTHUB_SERVER_STAGING_PATH }}
          SERVER_CLONEHERO_PATH: ${{ secrets.CHARTHUB_SERVER_CLONEHERO_PATH }}
          SERVER_DB_PATH: ${{ secrets.CHARTHUB_SERVER_DB_PATH }}
          SERVER_LOGS_PATH: ${{ secrets.CHARTHUB_SERVER_LOGS_PATH }}
        run: |
          EFFECTIVE_PORT="${CHARTHUB_SERVER_PORT:-5180}"
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          EFFECTIVE_CONFIG="${SERVER_CONFIG_PATH:-/srv/appdata/charthub/config}"
          EFFECTIVE_DATA="${SERVER_DATA_PATH:-/srv/appdata/charthub/data}"
          EFFECTIVE_DOWNLOADS="${SERVER_DOWNLOADS_PATH:-/srv/appdata/charthub/data/downloads}"
          EFFECTIVE_STAGING="${SERVER_STAGING_PATH:-/srv/appdata/charthub/data/staging}"
          EFFECTIVE_CLONEHERO="${SERVER_CLONEHERO_PATH:-/srv/appdata/charthub/music}"
          EFFECTIVE_DB="${SERVER_DB_PATH:-/srv/appdata/charthub/db/charthub.db}"
          EFFECTIVE_LOGS="${SERVER_LOGS_PATH:-/srv/appdata/charthub/logs}"
          LOCAL_ENV_FILE="$(mktemp)"
          {
            echo "ASPNETCORE_URLS=http://+:${EFFECTIVE_PORT}"
            echo "Auth__JwtSigningKey=${AUTH_JWT_SIGNING_KEY}"
            echo "Auth__Issuer=${AUTH_ISSUER}"
            echo "Auth__Audience=${AUTH_AUDIENCE}"
            echo "Auth__AccessTokenMinutes=60"
            echo "GoogleDrive__ApiKey=${GOOGLE_DRIVE_API_KEY}"
            echo "ServerPaths__ConfigRoot=${EFFECTIVE_CONFIG}"
            echo "ServerPaths__ChartHubRoot=${EFFECTIVE_DATA}"
            echo "ServerPaths__DownloadsDir=${EFFECTIVE_DOWNLOADS}"
            echo "ServerPaths__StagingDir=${EFFECTIVE_STAGING}"
            echo "ServerPaths__CloneHeroRoot=${EFFECTIVE_CLONEHERO}"
            echo "ServerPaths__SqliteDbPath=${EFFECTIVE_DB}"
            echo "ServerLogging__LogDirectory=${EFFECTIVE_LOGS}"
            echo "ServerLogging__FileName=charthub-server.log"
            echo "CHARTHUB_SERVER_PORT=${EFFECTIVE_PORT}"
            echo "Hud__ExecutablePath=$(dirname \"${EFFECTIVE_CONFIG}\")/current/ChartHub.Hud"
            echo "Hud__ServerPort=${EFFECTIVE_PORT}"
          } > "$LOCAL_ENV_FILE"

          # Parse JSON array secrets (e.g. ["email@domain.com","other@domain.com"])
          auth_allowed_index=0
          while IFS= read -r item; do
            [[ -n "$item" ]] || continue
            printf 'Auth__AllowedEmails__%d=%s\n' "$auth_allowed_index" "$item" >> "$LOCAL_ENV_FILE"
            auth_allowed_index=$((auth_allowed_index + 1))
          done < <(python3 -c "import json,sys; [print(x) for x in json.loads(sys.argv[1])]" "${AUTH_ALLOWED_EMAIL:-[]}" 2>/dev/null)

          google_audience_index=0
          while IFS= read -r item; do
            [[ -n "$item" ]] || continue
            printf 'GoogleAuth__AllowedAudiences__%d=%s\n' "$google_audience_index" "$item" >> "$LOCAL_ENV_FILE"
            google_audience_index=$((google_audience_index + 1))
          done < <(python3 -c "import json,sys; [print(x) for x in json.loads(sys.argv[1])]" "${GOOGLE_ALLOWED_AUDIENCE:-[]}" 2>/dev/null)

          chmod 600 "$LOCAL_ENV_FILE"
          scp -i ~/.ssh/deploy_key -P "$EFFECTIVE_SSH_PORT" -o BatchMode=yes \
            "$LOCAL_ENV_FILE" "${SSH_USER}@${SSH_HOST}:${EFFECTIVE_CONFIG}/charthub-server.env"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "chmod 600 \"${EFFECTIVE_CONFIG}/charthub-server.env\""
          rm -f "$LOCAL_ENV_FILE"

      - name: Install release bundle
        env:
          VERSION: ${{ needs.classify.outputs.version }}
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
          SERVER_CONFIG_PATH: ${{ secrets.CHARTHUB_SERVER_CONFIG_PATH }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          EFFECTIVE_CONFIG="${SERVER_CONFIG_PATH:-/srv/appdata/charthub/config}"
          RELEASES_DIR="$(dirname "$EFFECTIVE_CONFIG")/releases"
          INSTALL_ROOT="$(dirname "$EFFECTIVE_CONFIG")"
          ARTIFACT="./.server-release/charthub-server-${VERSION}-linux-x64.zip"
          scp -i ~/.ssh/deploy_key -P "$EFFECTIVE_SSH_PORT" -o BatchMode=yes \
            "$ARTIFACT" "${SSH_USER}@${SSH_HOST}:/tmp/charthub-server-${VERSION}-linux-x64.zip"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            set -e
            RELEASE_DIR=\"${RELEASES_DIR}/${VERSION}\"
            rm -rf \"\$RELEASE_DIR\"
            mkdir -p \"\$RELEASE_DIR\"
            unzip -q \"/tmp/charthub-server-${VERSION}-linux-x64.zip\" -d \"\$RELEASE_DIR\"
            ln -sfn \"\$RELEASE_DIR/server-linux-x64\" \"${INSTALL_ROOT}/current\"
            chmod +x \"${INSTALL_ROOT}/current/ChartHub.Server\" || true
            chmod +x \"${INSTALL_ROOT}/current/ChartHub.Hud\" || true
            ln -sfn "${INSTALL_ROOT}" /srv/appdata/charthub/active
            rm -f \"/tmp/charthub-server-${VERSION}-linux-x64.zip\"
          "

      - name: Install or update systemd unit and write kiosk env
        env:
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
          CONFIG_PATH: ${{ secrets.CHARTHUB_SERVER_CONFIG_PATH }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          EFFECTIVE_CONFIG="${CONFIG_PATH:-/srv/appdata/charthub/config}"
          INSTALL_ROOT="$(dirname "$EFFECTIVE_CONFIG")"
          scp -i ~/.ssh/deploy_key -P "$EFFECTIVE_SSH_PORT" -o BatchMode=yes \
            .github/systemd/charthub-server.service "${SSH_USER}@${SSH_HOST}:/tmp/charthub-server.service"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            # Write kiosk env inside the install root — the deploy user already owns this
            # directory so no sudo is required. start-kiosk-session.sh sources this file
            # to know which binary to run. Safe to write on non-kiosk machines too.
            printf 'CHARTHUB_SERVER=%s/current/ChartHub.Server\\n' \"${INSTALL_ROOT}\" \
              > \"${INSTALL_ROOT}/kiosk.env\"
            # Install systemd unit. kiosk-setup.sh pre-installs and enables this unit;
            # overwriting it here keeps the file in sync with the deployed version.
            sudo install -m 644 /tmp/charthub-server.service /etc/systemd/system/charthub-server.service 2>/dev/null || true
            sudo systemctl daemon-reload || true
            sudo systemctl enable charthub-server.service 2>/dev/null || true
            rm -f /tmp/charthub-server.service
          "

      - name: Restart server service
        env:
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            if sudo systemctl is-active --quiet charthub-server.service 2>/dev/null || \
               sudo systemctl is-enabled --quiet charthub-server.service 2>/dev/null; then
              sudo systemctl restart charthub-server.service
