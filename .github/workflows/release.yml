            else
              # Kiosk mode: service is masked; kill the running process so the X session
              # exits and LightDM restarts it via start-kiosk-session.sh with the new binary.
              pkill -f 'ChartHub.Server' || true
              echo 'Kiosk mode: sent SIGTERM to ChartHub.Server (LightDM will restart the session)'
            fi
          "

      - name: Verify health
        env:
          SSH_HOST: ${{ secrets.SERVER_DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.SERVER_DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.SERVER_DEPLOY_SSH_PORT }}
          CHARTHUB_SERVER_PORT: ${{ secrets.CHARTHUB_SERVER_CHARTHUB_PORT }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          EFFECTIVE_PORT="${CHARTHUB_SERVER_PORT:-5180}"
          for i in $(seq 1 12); do
            STATUS=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:${EFFECTIVE_PORT}/health 2>/dev/null || echo 000")
            if [[ "$STATUS" == "200" ]]; then
              break
            fi
            if [[ "$i" == "12" ]]; then
              echo "Dev /health check failed on port ${EFFECTIVE_PORT}"
              ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
                "sudo journalctl -u charthub-server.service --no-pager -n 200 || true"
              exit 1
            fi
            sleep 5
          done

      - name: Write deployment summary
        env:
          VERSION: ${{ needs.classify.outputs.version }}
        run: |
          {
            echo "## Dev deployment complete (ChartHub Server bundle)"
            echo "- Version: ${VERSION}"
            echo "- Install root: /srv/appdata/charthub"
            echo "- Active release: /srv/appdata/charthub/current"
            echo "- Time: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

