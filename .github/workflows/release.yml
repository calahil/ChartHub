name: Release and Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  classify:
    name: Classify release channel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.classify.outputs.version }}
      android_version_code: ${{ steps.classify.outputs.android_version_code }}
      release_channel: ${{ steps.classify.outputs.release_channel }}
      is_tag_release: ${{ steps.classify.outputs.is_tag_release }}
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
      image_tag: ${{ steps.classify.outputs.image_tag }}
      image_tag_minor: ${{ steps.classify.outputs.image_tag_minor }}
    steps:
      - name: Classify tag
        id: classify
        run: |
          REF_TYPE="${GITHUB_REF_TYPE}"
          REF_NAME="${GITHUB_REF_NAME}"

          if [[ "$REF_TYPE" != "tag" ]]; then
            echo "Unsupported ref type: ${REF_TYPE}"
            exit 1
          fi

          TAG="${REF_NAME}"

          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-dev$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            echo "release_channel=dev" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${MAJOR}.${MINOR}.${PATCH}-dev" >> "$GITHUB_OUTPUT"
            echo "image_tag=${MAJOR}.${MINOR}.${PATCH}-dev" >> "$GITHUB_OUTPUT"
            echo "image_tag_minor=" >> "$GITHUB_OUTPUT"
            echo "android_version_code=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-rc\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            RC_NUM="${BASH_REMATCH[4]}"
            echo "release_channel=rc" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${MAJOR}.${MINOR}.${PATCH}-rc.${RC_NUM}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${MAJOR}.${MINOR}.${PATCH}-rc.${RC_NUM}" >> "$GITHUB_OUTPUT"
            echo "image_tag_minor=" >> "$GITHUB_OUTPUT"
            echo "android_version_code=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            echo "release_channel=stable" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
            echo "image_tag_minor=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"
            echo "android_version_code=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unsupported tag format '${TAG}'. Use vX.Y.Z-dev, vX.Y.Z-rc.N, or vX.Y.Z"
          exit 1

  validate:
    name: Quality gates
    needs: classify
    uses: ./.github/workflows/dotnet-quality.yml
    with:
      dotnet_version: 10.0.x
      coverage_threshold: 70
      run_backupapi_tests: true

  build-desktop:
    name: Publish desktop (${{ matrix.rid }})
    if: needs.classify.outputs.release_channel == 'rc' || needs.classify.outputs.release_channel == 'stable'
    runs-on: ubuntu-latest
    needs: [classify, validate]
    strategy:
      fail-fast: true
      matrix:
        rid: [linux-x64, win-x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChartHub/ChartHub.csproj -r ${{ matrix.rid }} /p:TargetFramework=net10.0

      - name: Publish
        run: >-
          dotnet publish ChartHub/ChartHub.csproj
          --configuration Release
          --no-restore
          -r ${{ matrix.rid }}
          --self-contained true
          -p:TargetFramework=net10.0
          -p:Version=${{ needs.classify.outputs.version }}
          -o ./publish/${{ matrix.rid }}

      - name: Archive
        run: |
          cd publish
          zip -r \
            "../charthub-${{ needs.classify.outputs.version }}-${{ matrix.rid }}.zip" \
            "${{ matrix.rid }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.rid }}
          path: charthub-${{ needs.classify.outputs.version }}-${{ matrix.rid }}.zip
          retention-days: 1

  build-android:
    name: Build Android APK
    if: needs.classify.outputs.release_channel == 'rc' || needs.classify.outputs.release_channel == 'stable'
    runs-on: ubuntu-latest
    needs: [classify, validate]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Android workload
        run: dotnet workload install android

      - name: Inject Android OAuth client ID
        env:
          ANDROID_CLIENT_ID: ${{ secrets.GOOGLEDRIVE_ANDROID_CLIENT_ID }}
        run: |
          if [[ -z "$ANDROID_CLIENT_ID" ]]; then
            echo "GOOGLEDRIVE_ANDROID_CLIENT_ID secret is not set"
            exit 1
          fi
          # Extract the numeric prefix (everything before .apps.googleusercontent.com)
          CLIENT_ID_PREFIX="${ANDROID_CLIENT_ID%.apps.googleusercontent.com}"
          REDIRECT_SCHEME="com.googleusercontent.apps.${CLIENT_ID_PREFIX}"
          sed -i "s|com.googleusercontent.apps.REPLACE_WITH_ANDROID_CLIENT_ID_PREFIX|${REDIRECT_SCHEME}|g" \
            ChartHub/Android/GoogleSignInActivity.cs

      - name: Build APK
        run: >-
          dotnet build ChartHub/ChartHub.csproj
          --configuration Release
          -p:EnableAndroid=true
          -f net10.0-android
          -p:ApplicationDisplayVersion=${{ needs.classify.outputs.version }}
          -p:ApplicationVersion=${{ needs.classify.outputs.android_version_code }}

      - name: Locate and stage APK
        run: |
          APK=$(find ChartHub/bin/Release/net10.0-android -name "*.apk" | head -1)
          if [[ -z "$APK" ]]; then
            echo "No APK found under ChartHub/bin/Release/net10.0-android"
            exit 1
          fi
          cp "$APK" "charthub-${{ needs.classify.outputs.version }}-unsigned.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: charthub-${{ needs.classify.outputs.version }}-unsigned.apk
          retention-days: 1

  build-api-image:
    name: Build and push Backup API image
    runs-on: ubuntu-latest
    needs: [classify, validate]
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          CHANNEL: ${{ needs.classify.outputs.release_channel }}
          IMAGE_TAG: ${{ needs.classify.outputs.image_tag }}
          IMAGE_TAG_MINOR: ${{ needs.classify.outputs.image_tag_minor }}
        run: |
          BASE="ghcr.io/${REPO_OWNER}/charthub-backup-api"
          if [[ "$CHANNEL" == "dev" ]]; then
            {
              echo "tags<<EOF"
              echo "${BASE}:${IMAGE_TAG}"
              echo "${BASE}:dev-latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$CHANNEL" == "rc" ]]; then
            {
              echo "tags<<EOF"
              echo "${BASE}:${IMAGE_TAG}"
              echo "${BASE}:rc-latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "tags<<EOF"
            echo "${BASE}:${IMAGE_TAG}"
            echo "${BASE}:${IMAGE_TAG_MINOR}"
            echo "${BASE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ChartHub.BackupApi/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=ChartHub Backup API
            org.opencontainers.image.vendor=Calahil Studios
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.classify.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/charthub-backup-api:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/charthub-backup-api:buildcache,mode=max

  build-server-bundle:
    name: Publish ChartHub.Server (linux-x64)
    if: needs.classify.outputs.release_channel == 'dev' || needs.classify.outputs.release_channel == 'rc' || needs.classify.outputs.release_channel == 'stable'
    runs-on: ubuntu-latest
    needs: [classify, validate]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChartHub.Server/ChartHub.Server.csproj -r linux-x64

      - name: Publish server
        run: >-
          dotnet publish ChartHub.Server/ChartHub.Server.csproj
          --configuration Release
          --no-restore
          -r linux-x64
          --self-contained true
          -p:Version=${{ needs.classify.outputs.version }}
          -o ./publish/server-linux-x64

      - name: Restore Hud
        run: dotnet restore ChartHub.Hud/ChartHub.Hud.csproj -r linux-x64

      - name: Publish Hud
        run: >-
          dotnet publish ChartHub.Hud/ChartHub.Hud.csproj
          --configuration Release
          --no-restore
          -r linux-x64
          --self-contained true
          -p:Version=${{ needs.classify.outputs.version }}
          -o ./publish/server-linux-x64

      - name: Archive
        run: |
          cd publish
          zip -r ../charthub-server-${{ needs.classify.outputs.version }}-linux-x64.zip server-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-linux-x64
          path: charthub-server-${{ needs.classify.outputs.version }}-linux-x64.zip
          retention-days: 1

  publish-release:
    name: Publish GitHub Release
    if: >-
      (needs.classify.outputs.release_channel == 'rc' || needs.classify.outputs.release_channel == 'stable') &&
      (needs.build-server-bundle.result == 'success' || needs.build-server-bundle.result == 'skipped')
    runs-on: ubuntu-latest
    needs: [classify, build-desktop, build-android, build-api-image, build-server-bundle]
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: ./release-assets
          merge-multiple: true

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./release-assets

      - name: Download Server Linux artifact
        if: needs.classify.outputs.release_channel == 'rc' || needs.classify.outputs.release_channel == 'stable'
        uses: actions/download-artifact@v4
        with:
          name: server-linux-x64
          path: ./release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.classify.outputs.version }}
          IS_PRERELEASE: ${{ needs.classify.outputs.is_prerelease }}
        run: |
          ARGS=(
            "create" "$TAG"
            "--repo" "${{ github.repository }}"
            "--title" "ChartHub ${VERSION}"
            "--generate-notes"
          )
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            ARGS+=("--prerelease")
          fi
          gh release "${ARGS[@]}" ./release-assets/*

      - name: Write release summary
        env:
          VERSION: ${{ needs.classify.outputs.version }}
          BACKUP_API_DIGEST: ${{ needs.build-api-image.outputs.image_digest }}
          REPO_OWNER: ${{ github.repository_owner }}
          RELEASE_CHANNEL: ${{ needs.classify.outputs.release_channel }}
        run: |
          {
            echo "## ChartHub ${VERSION}"
            echo ""
            echo "### Backup API"
            echo "- Image: ghcr.io/${REPO_OWNER}/charthub-backup-api:${VERSION}"
            echo "- Digest: ${BACKUP_API_DIGEST}"
            if [[ "$RELEASE_CHANNEL" == "rc" || "$RELEASE_CHANNEL" == "stable" ]]; then
              echo ""
              echo "### ChartHub Server"
              echo "- Linux bundle: charthub-server-${VERSION}-linux-x64.zip"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-dev:
    name: Deploy Backup API to dev
    if: needs.classify.outputs.release_channel == 'dev'
    runs-on: ubuntu-latest
    needs: [classify, build-api-image]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose Tailscale secret
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "${TS_KEY}" ]; then
            echo "::error::TAILSCALE_AUTHKEY is EMPTY - secret not delivered to this job"
            exit 1
          fi
          echo "TAILSCALE_AUTHKEY length: ${#TS_KEY}"
          echo "TAILSCALE_AUTHKEY prefix: ${TS_KEY:0:8}..."

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.BACKUP_API_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$EFFECTIVE_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Log in to GHCR on host
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          printf '%s\n' "$GH_TOKEN" | ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "docker login ghcr.io -u '${GH_ACTOR}' --password-stdin"

      - name: Write and transfer env file
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          BACKUP_API_IMAGE: ghcr.io/${{ github.repository_owner }}/charthub-backup-api:${{ needs.classify.outputs.image_tag }}
          PSQL_CONTAINER_NAME: ${{ secrets.PSQL_CONTAINER_NAME }}
          PSQL_PORT: ${{ secrets.PSQL_PORT }}
          PSQL_USER: ${{ secrets.PSQL_USER }}
          PSQL_PASSWORD: ${{ secrets.PSQL_PASSWORD }}
          PSQL_DB: ${{ secrets.PSQL_DB }}
          INTERNAL: ${{ secrets.INTERNAL }}
          API_PORT: ${{ secrets.API_PORT }}
          BACKUP_API_CONTAINER_NAME: charthub-dev-backup-api
          BACKUP_DOWNLOADS_HOST_PATH: ${{ secrets.BACKUP_DOWNLOADS_HOST_PATH }}
          BACKUP_IMAGES_HOST_PATH: ${{ secrets.BACKUP_IMAGES_HOST_PATH }}
          RHYTHMVERSE_TOKEN: ${{ secrets.RHYTHMVERSE_TOKEN }}
          BACKUP_SYNC_ENABLED: ${{ secrets.BACKUP_SYNC_ENABLED }}
          DB_VOLUME: ${{ secrets.DB_VOLUME }}
          BACKUP_API_KEY: ${{ secrets.BACKUP_API_KEY }}
        run: |
          printenv BACKUP_API_IMAGE     | xargs -I{} printf 'BACKUP_API_IMAGE=%s\n' "{}" > .env.deploy
          printenv PSQL_CONTAINER_NAME  | xargs -I{} printf 'PSQL_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv PSQL_PORT            | xargs -I{} printf 'PSQL_PORT=%s\n' "{}" >> .env.deploy
          printenv PSQL_USER            | xargs -I{} printf 'PSQL_USER=%s\n' "{}" >> .env.deploy
          printenv PSQL_PASSWORD        | xargs -I{} printf 'PSQL_PASSWORD=%s\n' "{}" >> .env.deploy
          printenv PSQL_DB              | xargs -I{} printf 'PSQL_DB=%s\n' "{}" >> .env.deploy
          printenv INTERNAL             | xargs -I{} printf 'INTERNAL=%s\n' "{}" >> .env.deploy
          printenv API_PORT             | xargs -I{} printf 'API_PORT=%s\n' "{}" >> .env.deploy
          printenv BACKUP_API_CONTAINER_NAME | xargs -I{} printf 'BACKUP_API_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_DOWNLOADS_HOST_PATH | xargs -I{} printf 'BACKUP_DOWNLOADS_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv BACKUP_IMAGES_HOST_PATH    | xargs -I{} printf 'BACKUP_IMAGES_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv RHYTHMVERSE_TOKEN    | xargs -I{} printf 'RHYTHMVERSE_TOKEN=%s\n' "{}" >> .env.deploy
          printenv BACKUP_SYNC_ENABLED  | xargs -I{} printf 'BACKUP_SYNC_ENABLED=%s\n' "{}" >> .env.deploy
          printenv DB_VOLUME            | xargs -I{} printf 'DB_VOLUME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_API_KEY       | xargs -I{} printf 'BACKUP_API_KEY=%s\n' "{}" >> .env.deploy
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          scp -i ~/.ssh/deploy_key -P "$EFFECTIVE_PORT" -o BatchMode=yes \
            docker-compose.yml .env.deploy "${SSH_USER}@${SSH_HOST}:/tmp/"
          rm -f .env.deploy

      - name: Pull and deploy
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            docker compose -f /tmp/docker-compose.yml --project-name charthub-dev --env-file /tmp/.env.deploy pull backup-api
            docker compose -f /tmp/docker-compose.yml --project-name charthub-dev --env-file /tmp/.env.deploy up -d --no-build backup-api
          "

      - name: Verify health
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          API_PORT: ${{ secrets.API_PORT }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          EFFECTIVE_API_PORT="${API_PORT:-5147}"
          if [[ -z "${API_PORT:-}" ]]; then
            echo "API_PORT secret is not set; using compose default port ${EFFECTIVE_API_PORT}"
          fi
          if ! [[ "$EFFECTIVE_API_PORT" =~ ^[0-9]+$ ]]; then
            echo "Invalid API port: '${EFFECTIVE_API_PORT}'"
            exit 1
          fi

          for i in $(seq 1 24); do
            STATUS=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:${EFFECTIVE_API_PORT}/health 2>/dev/null || echo 000")
            if [[ "$STATUS" == "200" ]]; then
              break
            fi
            if [[ "$i" == "24" ]]; then
              echo "Dev /health check failed on port ${EFFECTIVE_API_PORT}"
              ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
                "docker compose --project-name charthub-dev ps || true; docker compose --project-name charthub-dev logs --tail 200 backup-api || true"
              exit 1
            fi
            sleep 5
          done
          for i in $(seq 1 12); do
            HTTP=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:${EFFECTIVE_API_PORT}/api/rhythmverse/health/sync 2>/dev/null || echo 000")
            if [[ "$HTTP" == "200" ]]; then
              break
            fi
            if [[ "$i" == "12" ]]; then
              echo "Dev sync health check failed on port ${EFFECTIVE_API_PORT}"
              ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
                "docker compose --project-name charthub-dev ps || true; docker compose --project-name charthub-dev logs --tail 200 backup-api || true"
              exit 1
            fi
            sleep 5
          done

      - name: Clean up
        if: always()
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "rm -f /tmp/.env.deploy /tmp/docker-compose.yml" || true
          rm -f ~/.ssh/deploy_key

  deploy-staging:
    name: Deploy Backup API to staging
    if: needs.classify.outputs.release_channel == 'rc' || needs.classify.outputs.release_channel == 'stable'
    runs-on: ubuntu-latest
    needs: [classify, build-api-image]
    outputs:
      staged_image_ref: ${{ steps.capture-staged-image.outputs.staged_image_ref }}
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose Tailscale secret
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "${TS_KEY}" ]; then
            echo "::error::TAILSCALE_AUTHKEY is EMPTY - secret not delivered to this job"
            exit 1
          fi
          echo "TAILSCALE_AUTHKEY length: ${#TS_KEY}"
          echo "TAILSCALE_AUTHKEY prefix: ${TS_KEY:0:8}..."

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.BACKUP_API_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$EFFECTIVE_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Log in to GHCR on host
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          printf '%s\n' "$GH_TOKEN" | ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "docker login ghcr.io -u '${GH_ACTOR}' --password-stdin"

      - name: Write and transfer env file
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          BACKUP_API_IMAGE: ghcr.io/${{ github.repository_owner }}/charthub-backup-api@${{ needs.build-api-image.outputs.image_digest }}
          PSQL_CONTAINER_NAME: ${{ secrets.PSQL_CONTAINER_NAME }}
          PSQL_PORT: ${{ secrets.PSQL_PORT }}
          PSQL_USER: ${{ secrets.PSQL_USER }}
          PSQL_PASSWORD: ${{ secrets.PSQL_PASSWORD }}
          PSQL_DB: ${{ secrets.PSQL_DB }}
          INTERNAL: ${{ secrets.INTERNAL }}
          API_PORT: ${{ secrets.API_PORT }}
          BACKUP_API_CONTAINER_NAME: charthub-staging-backup-api
          BACKUP_DOWNLOADS_HOST_PATH: ${{ secrets.BACKUP_DOWNLOADS_HOST_PATH }}
          BACKUP_IMAGES_HOST_PATH: ${{ secrets.BACKUP_IMAGES_HOST_PATH }}
          RHYTHMVERSE_TOKEN: ${{ secrets.RHYTHMVERSE_TOKEN }}
          BACKUP_SYNC_ENABLED: ${{ secrets.BACKUP_SYNC_ENABLED }}
          DB_VOLUME: ${{ secrets.DB_VOLUME }}
          BACKUP_API_KEY: ${{ secrets.BACKUP_API_KEY }}
        run: |
          printenv BACKUP_API_IMAGE     | xargs -I{} printf 'BACKUP_API_IMAGE=%s\n' "{}" > .env.deploy
          printenv PSQL_CONTAINER_NAME  | xargs -I{} printf 'PSQL_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv PSQL_PORT            | xargs -I{} printf 'PSQL_PORT=%s\n' "{}" >> .env.deploy
          printenv PSQL_USER            | xargs -I{} printf 'PSQL_USER=%s\n' "{}" >> .env.deploy
          printenv PSQL_PASSWORD        | xargs -I{} printf 'PSQL_PASSWORD=%s\n' "{}" >> .env.deploy
          printenv PSQL_DB              | xargs -I{} printf 'PSQL_DB=%s\n' "{}" >> .env.deploy
          printenv INTERNAL             | xargs -I{} printf 'INTERNAL=%s\n' "{}" >> .env.deploy
          printenv API_PORT             | xargs -I{} printf 'API_PORT=%s\n' "{}" >> .env.deploy
          printenv BACKUP_API_CONTAINER_NAME | xargs -I{} printf 'BACKUP_API_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_DOWNLOADS_HOST_PATH | xargs -I{} printf 'BACKUP_DOWNLOADS_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv BACKUP_IMAGES_HOST_PATH    | xargs -I{} printf 'BACKUP_IMAGES_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv RHYTHMVERSE_TOKEN    | xargs -I{} printf 'RHYTHMVERSE_TOKEN=%s\n' "{}" >> .env.deploy
          printenv BACKUP_SYNC_ENABLED  | xargs -I{} printf 'BACKUP_SYNC_ENABLED=%s\n' "{}" >> .env.deploy
          printenv DB_VOLUME            | xargs -I{} printf 'DB_VOLUME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_API_KEY       | xargs -I{} printf 'BACKUP_API_KEY=%s\n' "{}" >> .env.deploy
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          scp -i ~/.ssh/deploy_key -P "$EFFECTIVE_PORT" -o BatchMode=yes \
            docker-compose.yml .env.deploy "${SSH_USER}@${SSH_HOST}:/tmp/"
          rm -f .env.deploy

      - name: Pull and deploy
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            docker compose -f /tmp/docker-compose.yml --project-name charthub-staging --env-file /tmp/.env.deploy pull backup-api
            docker compose -f /tmp/docker-compose.yml --project-name charthub-staging --env-file /tmp/.env.deploy up -d --no-build backup-api
          "

      - name: Verify health
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          API_PORT: ${{ secrets.API_PORT }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          EFFECTIVE_API_PORT="${API_PORT:-5147}"
          if [[ -z "${API_PORT:-}" ]]; then
            echo "API_PORT secret is not set; using compose default port ${EFFECTIVE_API_PORT}"
          fi
          if ! [[ "$EFFECTIVE_API_PORT" =~ ^[0-9]+$ ]]; then
            echo "Invalid API port: '${EFFECTIVE_API_PORT}'"
            exit 1
          fi

          for i in $(seq 1 24); do
            STATUS=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:${EFFECTIVE_API_PORT}/health 2>/dev/null || echo 000")
            if [[ "$STATUS" == "200" ]]; then
              break
            fi
            if [[ "$i" == "24" ]]; then
              echo "Staging /health check failed on port ${EFFECTIVE_API_PORT}"
              ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
                "docker compose --project-name charthub-staging ps || true; docker compose --project-name charthub-staging logs --tail 200 backup-api || true"
              exit 1
            fi
            sleep 5
          done
          for i in $(seq 1 12); do
            HTTP=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:${EFFECTIVE_API_PORT}/api/rhythmverse/health/sync 2>/dev/null || echo 000")
            if [[ "$HTTP" == "200" ]]; then
              break
            fi
            if [[ "$i" == "12" ]]; then
              echo "Staging sync health check failed on port ${EFFECTIVE_API_PORT}"
              ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
                "docker compose --project-name charthub-staging ps || true; docker compose --project-name charthub-staging logs --tail 200 backup-api || true"
              exit 1
            fi
            sleep 5
          done

      - name: Verify staged image digest
        id: capture-staged-image
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          EXPECTED_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/charthub-backup-api@${{ needs.build-api-image.outputs.image_digest }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          EXPECTED_IMAGE_ID=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "docker image inspect '${EXPECTED_IMAGE_REF}' --format '{{ .Id }}'")
          ACTUAL_IMAGE_ID=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "docker inspect charthub-staging-backup-api --format '{{ .Image }}'")
          ACTUAL_IMAGE_REF=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "docker inspect charthub-staging-backup-api --format '{{ .Config.Image }}'")
          if [[ "$ACTUAL_IMAGE_ID" != "$EXPECTED_IMAGE_ID" ]]; then
            echo "Staging deployed unexpected image"
            echo "Expected: $EXPECTED_IMAGE_REF"
            echo "Expected image ID: $EXPECTED_IMAGE_ID"
            echo "Actual image ID:   $ACTUAL_IMAGE_ID"
            echo "Container image:   $ACTUAL_IMAGE_REF"
            exit 1
          fi
          echo "staged_image_ref=$EXPECTED_IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Clean up
        if: always()
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "rm -f /tmp/.env.deploy /tmp/docker-compose.yml" || true
          rm -f ~/.ssh/deploy_key

  deploy-production:
    name: Deploy Backup API to production
    if: needs.classify.outputs.release_channel == 'stable'
    runs-on: ubuntu-latest
    needs: [classify, build-api-image, deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Diagnose Tailscale secret
        env:
          TS_KEY: ${{ secrets.TAILSCALE_AUTHKEY }}
        run: |
          if [ -z "${TS_KEY}" ]; then
            echo "::error::TAILSCALE_AUTHKEY is EMPTY - secret not delivered to this job"
            exit 1
          fi
          echo "TAILSCALE_AUTHKEY length: ${#TS_KEY}"
          echo "TAILSCALE_AUTHKEY prefix: ${TS_KEY:0:8}..."

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.BACKUP_API_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$EFFECTIVE_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify promotion digest from staging
        env:
          EXPECTED_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/charthub-backup-api@${{ needs.build-api-image.outputs.image_digest }}
          STAGED_IMAGE_REF: ${{ needs.deploy-staging.outputs.staged_image_ref }}
        run: |
          if [[ -z "$STAGED_IMAGE_REF" ]]; then
            echo "Staging image reference is missing"
            exit 1
          fi
          if [[ "$STAGED_IMAGE_REF" != "$EXPECTED_IMAGE_REF" ]]; then
            echo "Production blocked: staging image does not match expected digest"
            echo "Expected: $EXPECTED_IMAGE_REF"
            echo "Staged:   $STAGED_IMAGE_REF"
            exit 1
          fi

      - name: Log in to GHCR on host
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          printf '%s\n' "$GH_TOKEN" | ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "docker login ghcr.io -u '${GH_ACTOR}' --password-stdin"

      - name: Write and transfer env file
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          BACKUP_API_IMAGE: ghcr.io/${{ github.repository_owner }}/charthub-backup-api@${{ needs.build-api-image.outputs.image_digest }}
          PSQL_CONTAINER_NAME: ${{ secrets.PSQL_CONTAINER_NAME }}
          PSQL_PORT: ${{ secrets.PSQL_PORT }}
          PSQL_USER: ${{ secrets.PSQL_USER }}
          PSQL_PASSWORD: ${{ secrets.PSQL_PASSWORD }}
          PSQL_DB: ${{ secrets.PSQL_DB }}
          INTERNAL: ${{ secrets.INTERNAL }}
          API_PORT: ${{ secrets.API_PORT }}
          BACKUP_API_CONTAINER_NAME: charthub-prod-backup-api
          BACKUP_DOWNLOADS_HOST_PATH: ${{ secrets.BACKUP_DOWNLOADS_HOST_PATH }}
          BACKUP_IMAGES_HOST_PATH: ${{ secrets.BACKUP_IMAGES_HOST_PATH }}
          RHYTHMVERSE_TOKEN: ${{ secrets.RHYTHMVERSE_TOKEN }}
          BACKUP_SYNC_ENABLED: ${{ secrets.BACKUP_SYNC_ENABLED }}
          DB_VOLUME: ${{ secrets.DB_VOLUME }}
          BACKUP_API_KEY: ${{ secrets.BACKUP_API_KEY }}
        run: |
          printenv BACKUP_API_IMAGE     | xargs -I{} printf 'BACKUP_API_IMAGE=%s\n' "{}" > .env.deploy
          printenv PSQL_CONTAINER_NAME  | xargs -I{} printf 'PSQL_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv PSQL_PORT            | xargs -I{} printf 'PSQL_PORT=%s\n' "{}" >> .env.deploy
          printenv PSQL_USER            | xargs -I{} printf 'PSQL_USER=%s\n' "{}" >> .env.deploy
          printenv PSQL_PASSWORD        | xargs -I{} printf 'PSQL_PASSWORD=%s\n' "{}" >> .env.deploy
          printenv PSQL_DB              | xargs -I{} printf 'PSQL_DB=%s\n' "{}" >> .env.deploy
          printenv INTERNAL             | xargs -I{} printf 'INTERNAL=%s\n' "{}" >> .env.deploy
          printenv API_PORT             | xargs -I{} printf 'API_PORT=%s\n' "{}" >> .env.deploy
          printenv BACKUP_API_CONTAINER_NAME | xargs -I{} printf 'BACKUP_API_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_DOWNLOADS_HOST_PATH | xargs -I{} printf 'BACKUP_DOWNLOADS_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv BACKUP_IMAGES_HOST_PATH    | xargs -I{} printf 'BACKUP_IMAGES_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv RHYTHMVERSE_TOKEN    | xargs -I{} printf 'RHYTHMVERSE_TOKEN=%s\n' "{}" >> .env.deploy
          printenv BACKUP_SYNC_ENABLED  | xargs -I{} printf 'BACKUP_SYNC_ENABLED=%s\n' "{}" >> .env.deploy
          printenv DB_VOLUME            | xargs -I{} printf 'DB_VOLUME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_API_KEY       | xargs -I{} printf 'BACKUP_API_KEY=%s\n' "{}" >> .env.deploy
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          scp -i ~/.ssh/deploy_key -P "$EFFECTIVE_PORT" -o BatchMode=yes \
            docker-compose.yml .env.deploy "${SSH_USER}@${SSH_HOST}:/tmp/"
          rm -f .env.deploy

      - name: Pull and deploy
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" "
            docker compose -f /tmp/docker-compose.yml --project-name charthub-prod --env-file /tmp/.env.deploy pull backup-api
            docker compose -f /tmp/docker-compose.yml --project-name charthub-prod --env-file /tmp/.env.deploy up -d --no-build backup-api
          "

      - name: Verify health
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          API_PORT: ${{ secrets.API_PORT }}
        run: |
          EFFECTIVE_SSH_PORT="${SSH_PORT:-22}"
          EFFECTIVE_API_PORT="${API_PORT:-5147}"
          if [[ -z "${API_PORT:-}" ]]; then
            echo "API_PORT secret is not set; using compose default port ${EFFECTIVE_API_PORT}"
          fi
          if ! [[ "$EFFECTIVE_API_PORT" =~ ^[0-9]+$ ]]; then
            echo "Invalid API port: '${EFFECTIVE_API_PORT}'"
            exit 1
          fi

          for i in $(seq 1 24); do
            STATUS=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:${EFFECTIVE_API_PORT}/health 2>/dev/null || echo 000")
            if [[ "$STATUS" == "200" ]]; then
              break
            fi
            if [[ "$i" == "24" ]]; then
              echo "Production /health check failed on port ${EFFECTIVE_API_PORT}"
              ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
                "docker compose --project-name charthub-prod ps || true; docker compose --project-name charthub-prod logs --tail 200 backup-api || true"
              exit 1
            fi
            sleep 5
          done
          for i in $(seq 1 12); do
            HTTP=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:${EFFECTIVE_API_PORT}/api/rhythmverse/health/sync 2>/dev/null || echo 000")
            if [[ "$HTTP" == "200" ]]; then
              break
            fi
            if [[ "$i" == "12" ]]; then
              echo "Production sync health check failed on port ${EFFECTIVE_API_PORT}"
              ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_SSH_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
                "docker compose --project-name charthub-prod ps || true; docker compose --project-name charthub-prod logs --tail 200 backup-api || true"
              exit 1
            fi
            sleep 5
          done

      - name: Verify production image digest
        env:
          SSH_HOST: ${{ secrets.BACKUP_API_SSH_HOST }}
          SSH_USER: ${{ secrets.BACKUP_API_SSH_USER }}
          SSH_PORT: ${{ secrets.BACKUP_API_SSH_PORT }}
          EXPECTED_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/charthub-backup-api@${{ needs.build-api-image.outputs.image_digest }}
        run: |
          EFFECTIVE_PORT="${SSH_PORT:-22}"
          EXPECTED_IMAGE_ID=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
            "docker image inspect '${EXPECTED_IMAGE_REF}' --format '{{ .Id }}'")
          ACTUAL_IMAGE_ID=$(ssh -i ~/.ssh/deploy_key -p "$EFFECTIVE_PORT" -o BatchMode=yes "${SSH_USER}@${SSH_HOST}" \
