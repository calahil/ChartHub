name: Release and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  classify:
    name: Classify release channel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.classify.outputs.version }}
      android_version_code: ${{ steps.classify.outputs.android_version_code }}
      release_channel: ${{ steps.classify.outputs.release_channel }}
      is_tag_release: ${{ steps.classify.outputs.is_tag_release }}
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
      image_tag: ${{ steps.classify.outputs.image_tag }}
      image_tag_minor: ${{ steps.classify.outputs.image_tag_minor }}
    steps:
      - name: Classify branch or tag
        id: classify
        run: |
          REF_TYPE="${GITHUB_REF_TYPE}"
          REF_NAME="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "$REF_TYPE" == "branch" && "$REF_NAME" == "main" ]]; then
            echo "release_channel=dev" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "android_version_code=1" >> "$GITHUB_OUTPUT"
            echo "image_tag=main-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "image_tag_minor=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$REF_TYPE" != "tag" ]]; then
            echo "Unsupported ref type: ${REF_TYPE}"
            exit 1
          fi

          TAG="${REF_NAME}"

          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)-rc\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            RC_NUM="${BASH_REMATCH[4]}"
            echo "release_channel=rc" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${MAJOR}.${MINOR}.${PATCH}-rc.${RC_NUM}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${MAJOR}.${MINOR}.${PATCH}-rc.${RC_NUM}" >> "$GITHUB_OUTPUT"
            echo "image_tag_minor=" >> "$GITHUB_OUTPUT"
            echo "android_version_code=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
            echo "release_channel=stable" >> "$GITHUB_OUTPUT"
            echo "is_tag_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
            echo "image_tag_minor=${MAJOR}.${MINOR}" >> "$GITHUB_OUTPUT"
            echo "android_version_code=$(( MAJOR * 1000000 + MINOR * 1000 + PATCH ))" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unsupported tag format '${TAG}'. Use vX.Y.Z or vX.Y.Z-rc.N"
          exit 1

  validate:
    name: Quality gates
    runs-on: ubuntu-latest
    needs: classify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChartHub.sln

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Fail on warning suppressions
        run: |
          if rg -n '#pragma warning disable|SuppressMessage' \
            --glob '!ChartHub/obj/**' \
            --glob '!ChartHub/bin/**' \
            --glob '!ChartHub/Models/APIRootResponse.cs' \
            ChartHub ChartHub.Tests; then
            echo "Warning suppressions found. These require explicit review."
            exit 1
          fi

      - name: Verify formatting
        run: dotnet format ChartHub.sln --verify-no-changes --severity error --no-restore

      - name: Build
        run: dotnet build ChartHub.sln --configuration Release --no-restore

      - name: Test ChartHub with coverage threshold
        run: >-
          dotnet test ChartHub.Tests/ChartHub.Tests.csproj
          --configuration Release
          --no-build
          /p:CollectCoverage=true
          /p:CoverletOutput=./TestResults/Coverage/
          /p:CoverletOutputFormat=cobertura
          /p:Threshold=70
          /p:ThresholdType=line
          /p:ThresholdStat=total

      - name: Test BackupApi
        run: >-
          dotnet test ChartHub.BackupApi.Tests/ChartHub.BackupApi.Tests.csproj
          --configuration Release
          --no-build

  build-desktop:
    name: Publish desktop (${{ matrix.rid }})
    if: needs.classify.outputs.is_tag_release == 'true'
    runs-on: ubuntu-latest
    needs: [classify, validate]
    strategy:
      fail-fast: true
      matrix:
        rid: [linux-x64, win-x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChartHub.sln -r ${{ matrix.rid }}

      - name: Publish
        run: >-
          dotnet publish ChartHub/ChartHub.csproj
          --configuration Release
          --no-restore
          -r ${{ matrix.rid }}
          --self-contained true
          -p:Version=${{ needs.classify.outputs.version }}
          -o ./publish/${{ matrix.rid }}

      - name: Archive
        run: |
          cd publish
          zip -r \
            "../charthub-${{ needs.classify.outputs.version }}-${{ matrix.rid }}.zip" \
            "${{ matrix.rid }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.rid }}
          path: charthub-${{ needs.classify.outputs.version }}-${{ matrix.rid }}.zip
          retention-days: 1

  build-android:
    name: Build Android APK
    if: needs.classify.outputs.is_tag_release == 'true'
    runs-on: ubuntu-latest
    needs: [classify, validate]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Android workload
        run: dotnet workload install android

      - name: Build APK
        run: >-
          dotnet build ChartHub/ChartHub.csproj
          --configuration Release
          -p:EnableAndroid=true
          -f net10.0-android
          -p:ApplicationDisplayVersion=${{ needs.classify.outputs.version }}
          -p:ApplicationVersion=${{ needs.classify.outputs.android_version_code }}

      - name: Locate and stage APK
        run: |
          APK=$(find ChartHub/bin/Release/net10.0-android -name "*.apk" | head -1)
          if [[ -z "$APK" ]]; then
            echo "No APK found under ChartHub/bin/Release/net10.0-android"
            exit 1
          fi
          cp "$APK" "charthub-${{ needs.classify.outputs.version }}-unsigned.apk"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: charthub-${{ needs.classify.outputs.version }}-unsigned.apk
          retention-days: 1

  build-api-image:
    name: Build and push Backup API image
    runs-on: ubuntu-latest
    needs: [classify, validate]
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          CHANNEL: ${{ needs.classify.outputs.release_channel }}
          IMAGE_TAG: ${{ needs.classify.outputs.image_tag }}
          IMAGE_TAG_MINOR: ${{ needs.classify.outputs.image_tag_minor }}
        run: |
          BASE="ghcr.io/${REPO_OWNER}/charthub-backup-api"
          if [[ "$CHANNEL" == "dev" ]]; then
            {
              echo "tags<<EOF"
              echo "${BASE}:${IMAGE_TAG}"
              echo "${BASE}:dev-latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$CHANNEL" == "rc" ]]; then
            {
              echo "tags<<EOF"
              echo "${BASE}:${IMAGE_TAG}"
              echo "${BASE}:rc-latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "tags<<EOF"
            echo "${BASE}:${IMAGE_TAG}"
            echo "${BASE}:${IMAGE_TAG_MINOR}"
            echo "${BASE}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ChartHub.BackupApi/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=ChartHub Backup API
            org.opencontainers.image.vendor=Calahil Studios
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.classify.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-release:
    name: Publish GitHub Release
    if: needs.classify.outputs.is_tag_release == 'true'
    runs-on: ubuntu-latest
    needs: [classify, build-desktop, build-android, build-api-image]
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: ./release-assets
          merge-multiple: true

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./release-assets

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.classify.outputs.version }}
          IS_PRERELEASE: ${{ needs.classify.outputs.is_prerelease }}
        run: |
          ARGS=(
            "create" "$TAG"
            "--repo" "${{ github.repository }}"
            "--title" "ChartHub ${VERSION}"
            "--generate-notes"
          )
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            ARGS+=("--prerelease")
          fi
          gh release "${ARGS[@]}" ./release-assets/*

      - name: Write release summary
        env:
          VERSION: ${{ needs.classify.outputs.version }}
          DIGEST: ${{ needs.build-api-image.outputs.image_digest }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          {
            echo "## ChartHub ${VERSION}"
            echo ""
            echo "### Backup API"
            echo "- Image: ghcr.io/${REPO_OWNER}/charthub-backup-api:${VERSION}"
            echo "- Digest: ${DIGEST}"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-dev:
    name: Deploy Backup API to dev
    if: needs.classify.outputs.release_channel == 'dev'
    runs-on: [self-hosted, linux, charthub-host]
    needs: [classify, build-api-image]
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Write env file
        env:
          BACKUP_API_IMAGE: ghcr.io/${{ github.repository_owner }}/charthub-backup-api:${{ needs.classify.outputs.image_tag }}
          PSQL_CONTAINER_NAME: ${{ secrets.PSQL_CONTAINER_NAME }}
          PSQL_PORT: ${{ secrets.PSQL_PORT }}
          PSQL_USER: ${{ secrets.PSQL_USER }}
          PSQL_PASSWORD: ${{ secrets.PSQL_PASSWORD }}
          PSQL_DB: ${{ secrets.PSQL_DB }}
          INTERNAL: ${{ secrets.INTERNAL }}
          API_PORT: ${{ secrets.API_PORT }}
          BACKUP_API_CONTAINER_NAME: charthub-dev-backup-api
          BACKUP_DOWNLOADS_HOST_PATH: ${{ secrets.BACKUP_DOWNLOADS_HOST_PATH }}
          BACKUP_IMAGES_HOST_PATH: ${{ secrets.BACKUP_IMAGES_HOST_PATH }}
          RHYTHMVERSE_TOKEN: ${{ secrets.RHYTHMVERSE_TOKEN }}
          BACKUP_SYNC_ENABLED: ${{ secrets.BACKUP_SYNC_ENABLED }}
          DB_VOLUME: ${{ secrets.DB_VOLUME }}
        run: |
          printenv BACKUP_API_IMAGE     | xargs -I{} printf 'BACKUP_API_IMAGE=%s\n' "{}" > .env.deploy
          printenv PSQL_CONTAINER_NAME  | xargs -I{} printf 'PSQL_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv PSQL_PORT            | xargs -I{} printf 'PSQL_PORT=%s\n' "{}" >> .env.deploy
          printenv PSQL_USER            | xargs -I{} printf 'PSQL_USER=%s\n' "{}" >> .env.deploy
          printenv PSQL_PASSWORD        | xargs -I{} printf 'PSQL_PASSWORD=%s\n' "{}" >> .env.deploy
          printenv PSQL_DB              | xargs -I{} printf 'PSQL_DB=%s\n' "{}" >> .env.deploy
          printenv INTERNAL             | xargs -I{} printf 'INTERNAL=%s\n' "{}" >> .env.deploy
          printenv API_PORT             | xargs -I{} printf 'API_PORT=%s\n' "{}" >> .env.deploy
          printenv BACKUP_API_CONTAINER_NAME | xargs -I{} printf 'BACKUP_API_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_DOWNLOADS_HOST_PATH | xargs -I{} printf 'BACKUP_DOWNLOADS_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv BACKUP_IMAGES_HOST_PATH    | xargs -I{} printf 'BACKUP_IMAGES_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv RHYTHMVERSE_TOKEN    | xargs -I{} printf 'RHYTHMVERSE_TOKEN=%s\n' "{}" >> .env.deploy
          printenv BACKUP_SYNC_ENABLED  | xargs -I{} printf 'BACKUP_SYNC_ENABLED=%s\n' "{}" >> .env.deploy
          printenv DB_VOLUME            | xargs -I{} printf 'DB_VOLUME=%s\n' "{}" >> .env.deploy

      - name: Pull and deploy
        run: |
          docker compose --project-name charthub-dev --env-file .env.deploy pull backup-api
          docker compose --project-name charthub-dev --env-file .env.deploy up -d --no-build

      - name: Verify health
        env:
          API_PORT: ${{ secrets.API_PORT }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${API_PORT}/health" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              break
            fi
            if [[ "$i" == "12" ]]; then
              echo "Dev /health check failed"
              exit 1
            fi
            sleep 5
          done
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${API_PORT}/api/rhythmverse/health/sync" 2>/dev/null || echo "000")
          if [[ "$HTTP" != "200" ]]; then
            echo "Dev sync health check failed"
            exit 1
          fi

      - name: Clean up env file
        if: always()
        run: rm -f .env.deploy

  deploy-staging:
    name: Deploy Backup API to staging
    if: needs.classify.outputs.release_channel == 'rc' || needs.classify.outputs.release_channel == 'stable'
    runs-on: [self-hosted, linux, charthub-host]
    needs: [classify, build-api-image]
    outputs:
      staged_image_ref: ${{ steps.capture-staged-image.outputs.staged_image_ref }}
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Write env file
        env:
          BACKUP_API_IMAGE: ghcr.io/${{ github.repository_owner }}/charthub-backup-api@${{ needs.build-api-image.outputs.image_digest }}
          PSQL_CONTAINER_NAME: ${{ secrets.PSQL_CONTAINER_NAME }}
          PSQL_PORT: ${{ secrets.PSQL_PORT }}
          PSQL_USER: ${{ secrets.PSQL_USER }}
          PSQL_PASSWORD: ${{ secrets.PSQL_PASSWORD }}
          PSQL_DB: ${{ secrets.PSQL_DB }}
          INTERNAL: ${{ secrets.INTERNAL }}
          API_PORT: ${{ secrets.API_PORT }}
          BACKUP_API_CONTAINER_NAME: charthub-staging-backup-api
          BACKUP_DOWNLOADS_HOST_PATH: ${{ secrets.BACKUP_DOWNLOADS_HOST_PATH }}
          BACKUP_IMAGES_HOST_PATH: ${{ secrets.BACKUP_IMAGES_HOST_PATH }}
          RHYTHMVERSE_TOKEN: ${{ secrets.RHYTHMVERSE_TOKEN }}
          BACKUP_SYNC_ENABLED: ${{ secrets.BACKUP_SYNC_ENABLED }}
          DB_VOLUME: ${{ secrets.DB_VOLUME }}
        run: |
          printenv BACKUP_API_IMAGE     | xargs -I{} printf 'BACKUP_API_IMAGE=%s\n' "{}" > .env.deploy
          printenv PSQL_CONTAINER_NAME  | xargs -I{} printf 'PSQL_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv PSQL_PORT            | xargs -I{} printf 'PSQL_PORT=%s\n' "{}" >> .env.deploy
          printenv PSQL_USER            | xargs -I{} printf 'PSQL_USER=%s\n' "{}" >> .env.deploy
          printenv PSQL_PASSWORD        | xargs -I{} printf 'PSQL_PASSWORD=%s\n' "{}" >> .env.deploy
          printenv PSQL_DB              | xargs -I{} printf 'PSQL_DB=%s\n' "{}" >> .env.deploy
          printenv INTERNAL             | xargs -I{} printf 'INTERNAL=%s\n' "{}" >> .env.deploy
          printenv API_PORT             | xargs -I{} printf 'API_PORT=%s\n' "{}" >> .env.deploy
          printenv BACKUP_API_CONTAINER_NAME | xargs -I{} printf 'BACKUP_API_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_DOWNLOADS_HOST_PATH | xargs -I{} printf 'BACKUP_DOWNLOADS_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv BACKUP_IMAGES_HOST_PATH    | xargs -I{} printf 'BACKUP_IMAGES_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv RHYTHMVERSE_TOKEN    | xargs -I{} printf 'RHYTHMVERSE_TOKEN=%s\n' "{}" >> .env.deploy
          printenv BACKUP_SYNC_ENABLED  | xargs -I{} printf 'BACKUP_SYNC_ENABLED=%s\n' "{}" >> .env.deploy
          printenv DB_VOLUME            | xargs -I{} printf 'DB_VOLUME=%s\n' "{}" >> .env.deploy

      - name: Pull and deploy
        run: |
          docker compose --project-name charthub-staging --env-file .env.deploy pull backup-api
          docker compose --project-name charthub-staging --env-file .env.deploy up -d --no-build

      - name: Verify health
        env:
          API_PORT: ${{ secrets.API_PORT }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${API_PORT}/health" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              break
            fi
            if [[ "$i" == "12" ]]; then
              echo "Staging /health check failed"
              exit 1
            fi
            sleep 5
          done
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${API_PORT}/api/rhythmverse/health/sync" 2>/dev/null || echo "000")
          if [[ "$HTTP" != "200" ]]; then
            echo "Staging sync health check failed"
            exit 1
          fi

      - name: Verify staged image digest
        id: capture-staged-image
        env:
          EXPECTED_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/charthub-backup-api@${{ needs.build-api-image.outputs.image_digest }}
        run: |
          EXPECTED_IMAGE_ID=$(docker image inspect "$EXPECTED_IMAGE_REF" --format '{{ .Id }}')
          ACTUAL_IMAGE_ID=$(docker inspect charthub-staging-backup-api --format '{{ .Image }}')
          ACTUAL_IMAGE_REF=$(docker inspect charthub-staging-backup-api --format '{{ .Config.Image }}')
          if [[ "$ACTUAL_IMAGE_ID" != "$EXPECTED_IMAGE_ID" ]]; then
            echo "Staging deployed unexpected image"
            echo "Expected: $EXPECTED_IMAGE_REF"
            echo "Expected image ID: $EXPECTED_IMAGE_ID"
            echo "Actual image ID:   $ACTUAL_IMAGE_ID"
            echo "Container image:   $ACTUAL_IMAGE_REF"
            exit 1
          fi
          echo "staged_image_ref=$EXPECTED_IMAGE_REF" >> "$GITHUB_OUTPUT"

      - name: Clean up env file
        if: always()
        run: rm -f .env.deploy

  deploy-production:
    name: Deploy Backup API to production
    if: needs.classify.outputs.release_channel == 'stable'
    runs-on: [self-hosted, linux, charthub-host]
    needs: [classify, build-api-image, deploy-staging]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Verify promotion digest from staging
        env:
          EXPECTED_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/charthub-backup-api@${{ needs.build-api-image.outputs.image_digest }}
          STAGED_IMAGE_REF: ${{ needs.deploy-staging.outputs.staged_image_ref }}
        run: |
          if [[ -z "$STAGED_IMAGE_REF" ]]; then
            echo "Staging image reference is missing"
            exit 1
          fi
          if [[ "$STAGED_IMAGE_REF" != "$EXPECTED_IMAGE_REF" ]]; then
            echo "Production blocked: staging image does not match expected digest"
            echo "Expected: $EXPECTED_IMAGE_REF"
            echo "Staged:   $STAGED_IMAGE_REF"
            exit 1
          fi

      - name: Write env file
        env:
          BACKUP_API_IMAGE: ghcr.io/${{ github.repository_owner }}/charthub-backup-api@${{ needs.build-api-image.outputs.image_digest }}
          PSQL_CONTAINER_NAME: ${{ secrets.PSQL_CONTAINER_NAME }}
          PSQL_PORT: ${{ secrets.PSQL_PORT }}
          PSQL_USER: ${{ secrets.PSQL_USER }}
          PSQL_PASSWORD: ${{ secrets.PSQL_PASSWORD }}
          PSQL_DB: ${{ secrets.PSQL_DB }}
          INTERNAL: ${{ secrets.INTERNAL }}
          API_PORT: ${{ secrets.API_PORT }}
          BACKUP_API_CONTAINER_NAME: charthub-prod-backup-api
          BACKUP_DOWNLOADS_HOST_PATH: ${{ secrets.BACKUP_DOWNLOADS_HOST_PATH }}
          BACKUP_IMAGES_HOST_PATH: ${{ secrets.BACKUP_IMAGES_HOST_PATH }}
          RHYTHMVERSE_TOKEN: ${{ secrets.RHYTHMVERSE_TOKEN }}
          BACKUP_SYNC_ENABLED: ${{ secrets.BACKUP_SYNC_ENABLED }}
          DB_VOLUME: ${{ secrets.DB_VOLUME }}
        run: |
          printenv BACKUP_API_IMAGE     | xargs -I{} printf 'BACKUP_API_IMAGE=%s\n' "{}" > .env.deploy
          printenv PSQL_CONTAINER_NAME  | xargs -I{} printf 'PSQL_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv PSQL_PORT            | xargs -I{} printf 'PSQL_PORT=%s\n' "{}" >> .env.deploy
          printenv PSQL_USER            | xargs -I{} printf 'PSQL_USER=%s\n' "{}" >> .env.deploy
          printenv PSQL_PASSWORD        | xargs -I{} printf 'PSQL_PASSWORD=%s\n' "{}" >> .env.deploy
          printenv PSQL_DB              | xargs -I{} printf 'PSQL_DB=%s\n' "{}" >> .env.deploy
          printenv INTERNAL             | xargs -I{} printf 'INTERNAL=%s\n' "{}" >> .env.deploy
          printenv API_PORT             | xargs -I{} printf 'API_PORT=%s\n' "{}" >> .env.deploy
          printenv BACKUP_API_CONTAINER_NAME | xargs -I{} printf 'BACKUP_API_CONTAINER_NAME=%s\n' "{}" >> .env.deploy
          printenv BACKUP_DOWNLOADS_HOST_PATH | xargs -I{} printf 'BACKUP_DOWNLOADS_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv BACKUP_IMAGES_HOST_PATH    | xargs -I{} printf 'BACKUP_IMAGES_HOST_PATH=%s\n' "{}" >> .env.deploy
          printenv RHYTHMVERSE_TOKEN    | xargs -I{} printf 'RHYTHMVERSE_TOKEN=%s\n' "{}" >> .env.deploy
          printenv BACKUP_SYNC_ENABLED  | xargs -I{} printf 'BACKUP_SYNC_ENABLED=%s\n' "{}" >> .env.deploy
          printenv DB_VOLUME            | xargs -I{} printf 'DB_VOLUME=%s\n' "{}" >> .env.deploy

      - name: Pull and deploy
        run: |
          docker compose --project-name charthub-prod --env-file .env.deploy pull backup-api
          docker compose --project-name charthub-prod --env-file .env.deploy up -d --no-build

      - name: Verify health
        env:
          API_PORT: ${{ secrets.API_PORT }}
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${API_PORT}/health" 2>/dev/null || echo "000")
            if [[ "$STATUS" == "200" ]]; then
              break
            fi
            if [[ "$i" == "12" ]]; then
              echo "Production /health check failed"
              exit 1
            fi
            sleep 5
          done
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:${API_PORT}/api/rhythmverse/health/sync" 2>/dev/null || echo "000")
          if [[ "$HTTP" != "200" ]]; then
            echo "Production sync health check failed"
            exit 1
          fi

      - name: Verify production image digest
        env:
          EXPECTED_IMAGE_REF: ghcr.io/${{ github.repository_owner }}/charthub-backup-api@${{ needs.build-api-image.outputs.image_digest }}
        run: |
          EXPECTED_IMAGE_ID=$(docker image inspect "$EXPECTED_IMAGE_REF" --format '{{ .Id }}')
          ACTUAL_IMAGE_ID=$(docker inspect charthub-prod-backup-api --format '{{ .Image }}')
          ACTUAL_IMAGE_REF=$(docker inspect charthub-prod-backup-api --format '{{ .Config.Image }}')
          if [[ "$ACTUAL_IMAGE_ID" != "$EXPECTED_IMAGE_ID" ]]; then
            echo "Production deployed unexpected image"
            echo "Expected: $EXPECTED_IMAGE_REF"
            echo "Expected image ID: $EXPECTED_IMAGE_ID"
            echo "Actual image ID:   $ACTUAL_IMAGE_ID"
            echo "Container image:   $ACTUAL_IMAGE_REF"
            exit 1
          fi

      - name: Write deployment summary
        env:
          VERSION: ${{ needs.classify.outputs.version }}
          DIGEST: ${{ needs.build-api-image.outputs.image_digest }}
        run: |
          {
            echo "## Production deployment complete"
            echo "- Version: ${VERSION}"
            echo "- Image digest: ${DIGEST}"
            echo "- Time: $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up env file
        if: always()
        run: rm -f .env.deploy
