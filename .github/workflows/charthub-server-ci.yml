name: ChartHub.Server CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-server:
    name: Build ChartHub.Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChartHub.Server/ChartHub.Server.csproj

      - name: Build
        run: dotnet build ChartHub.Server/ChartHub.Server.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test ChartHub.Server.Tests/ChartHub.Server.Tests.csproj --configuration Release --no-build

  docker-build-server:
    name: Build ChartHub.Server image
    runs-on: ubuntu-latest
    needs: build-server
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ChartHub.Server/Dockerfile
          push: false
          tags: charthub-server:ci
