name: ChartHub.Server CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-server:
    name: Build ChartHub.Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ChartHub.Server/ChartHub.Server.csproj

      - name: Build
        run: dotnet build ChartHub.Server/ChartHub.Server.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test ChartHub.Server.Tests/ChartHub.Server.Tests.csproj --configuration Release --no-build

  publish-server-linux:
    name: Publish ChartHub.Server linux-x64 bundle
    runs-on: ubuntu-latest
    needs: build-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore for linux-x64
        run: dotnet restore ChartHub.Server/ChartHub.Server.csproj -r linux-x64

      - name: Publish linux-x64
        run: >-
          dotnet publish ChartHub.Server/ChartHub.Server.csproj
          --configuration Release
          --no-restore
          -r linux-x64
          --self-contained true
          -o ./publish/server-linux-x64

      - name: Verify publish output
        run: |
          test -f ./publish/server-linux-x64/ChartHub.Server
          test -f ./publish/server-linux-x64/tools/onyx
