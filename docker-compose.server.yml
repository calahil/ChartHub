version: '3.8'

services:
  charthub-server:
    image: ${CHARTHUB_SERVER_IMAGE:-charthub-server:latest}
    container_name: ${CHARTHUB_SERVER_CONTAINER_NAME:-charthub-server}
    environment:
      ASPNETCORE_URLS: http://+:5001
      Auth__JwtSigningKey: ${Auth__JwtSigningKey}
      Auth__Issuer: ${Auth__Issuer}
      Auth__Audience: ${Auth__Audience}
      Auth__AllowedEmails__0: ${Auth__AllowedEmails__0}
      Auth__AccessTokenMinutes: ${Auth__AccessTokenMinutes:-60}
      GoogleAuth__AllowedAudiences__0: ${GoogleAuth__AllowedAudiences__0}
      GoogleDrive__ApiKey: ${GoogleDrive__ApiKey}
      ServerPaths__ConfigRoot: /config
      ServerPaths__ChartHubRoot: /charthub
      ServerPaths__DownloadsDir: /charthub/downloads
      ServerPaths__StagingDir: /charthub/staging
      ServerPaths__CloneHeroRoot: /clonehero
      ServerPaths__SqliteDbPath: /charthub/server.db
      ServerLogging__LogDirectory: /logs
      ServerLogging__FileName: charthub-server.log
    ports:
      - "${CHARTHUB_SERVER_PORT:-5180}:5001"
    volumes:
      - ${ServerPaths__ConfigRoot:-./dev-data/config}:/config
      - ${ServerPaths__ChartHubRoot:-./dev-data/charthub}:/charthub
      - ${ServerPaths__CloneHeroRoot:-./dev-data/clonehero}:/clonehero
      - charthub-server-logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ${INTERNAL:-charthub-internal}
    restart: unless-stopped

networks:
  charthub-internal:
    external: true
    name: ${INTERNAL:-charthub-internal}

volumes:
  charthub-server-logs:
    driver: local
    name: charthub-server-logs
