openapi: 3.1.0
info:
  title: ChartHub Ingestion Sync API
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  description: |
    Local sync API hosted by desktop ChartHub for Android-to-desktop ingestion lifecycle operations.

    Notes:
    - API host is loopback by default: http://127.0.0.1:15123
    - /health is unauthenticated
    - /api/pair/claim is unauthenticated and exchanges pair code for auth token
    - successful pair claim rotates the pair code and records pairing metadata/history in desktop runtime settings
    - /api/* endpoints require either X-ChartHub-Sync-Token or Authorization: Bearer
servers:
  - url: http://127.0.0.1:15123
    description: Local desktop host

tags:
  - name: Health
    description: Service health endpoints.
  - name: Metadata
    description: API metadata and capability endpoints.
  - name: Ingestions
    description: Ingestion lifecycle query and state transition endpoints.
  - name: Actions
    description: Action endpoints for retry/install/open-folder operations.
  - name: Pairing
    description: Pair-code handshake endpoints.

components:
  securitySchemes:
    SyncTokenHeader:
      type: apiKey
      in: header
      name: X-ChartHub-Sync-Token
      description: Runtime.SyncApiAuthToken from desktop config/runtime settings.
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-token
  parameters:
    IngestionId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    StateFilter:
      name: state
      in: query
      required: false
      schema:
        type: string
    SourceFilter:
      name: source
      in: query
      required: false
      schema:
        type: string
    SortField:
      name: sort
      in: query
      required: false
      schema:
        type: string
        default: Updated
        enum: [Updated, Source, State, Name]
    SortDesc:
      name: desc
      in: query
      required: false
      schema:
        type: boolean
        default: false
    ListLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 500
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    VersionResponse:
      type: object
      required: [api, version, supports, runtime]
      properties:
        api:
          type: string
          example: ingestion-sync
        version:
          type: string
          example: 1.0.0
        supports:
          type: object
          required: [ingestions, events, fromStateOverride, metadata, desktopLibraryStatus, desktopState]
          properties:
            ingestions:
              type: boolean
            events:
              type: boolean
            fromStateOverride:
              type: boolean
            metadata:
              type: boolean
            desktopLibraryStatus:
              type: boolean
            desktopState:
              type: boolean
        runtime:
          type: object
          required: [allowSyncApiStateOverride, pairCodeTtlMinutes, maxRequestBodyBytes, bodyReadTimeoutMs, mutationWaitTimeoutMs, slowRequestThresholdMs]
          properties:
            allowSyncApiStateOverride:
              type: boolean
            pairCodeTtlMinutes:
              type: integer
            maxRequestBodyBytes:
              type: integer
            bodyReadTimeoutMs:
              type: integer
            mutationWaitTimeoutMs:
              type: integer
            slowRequestThresholdMs:
              type: integer
            telemetry:
              type: object
              required: [startedAtUtc, requestsTotal, slowRequestsTotal, busyMutationRejectionsTotal, clientErrorsTotal, serverErrorsTotal]
              properties:
                startedAtUtc:
                  type: string
                  format: date-time
                requestsTotal:
                  type: integer
                  format: int64
                slowRequestsTotal:
                  type: integer
                  format: int64
                busyMutationRejectionsTotal:
                  type: integer
                  format: int64
                clientErrorsTotal:
                  type: integer
                  format: int64
                serverErrorsTotal:
                  type: integer
                  format: int64
    IngestionSyncRequest:
      type: object
      required: [source, sourceLink]
      properties:
        source:
          type: string
          example: googledrive
        sourceId:
          type: [string, 'null']
          example: drive-file-id
        sourceLink:
          type: string
          example: https://drive.google.com/file/d/abc123/view
        downloadedLocation:
          type: [string, 'null']
          example: /path/to/file.zip
        sizeBytes:
          type: [integer, 'null']
          format: int64
        contentHash:
          type: [string, 'null']
          example: sha256:abc123
        artist:
          type: [string, 'null']
        title:
          type: [string, 'null']
        charter:
          type: [string, 'null']
    IngestionEventRequest:
              librarySource:
                type: [string, 'null']
                description: Library classification source (rhythmverse, encore). Optional.
                example: rhythmverse
      type: object
      required: [toState]
      properties:
        fromState:
          type: [string, 'null']
        toState:
          type: string
        details:
          type: [string, 'null']
        allowFromStateOverride:
          type: boolean
          default: false
    PairClaimRequest:
      type: object
      required: [pairCode]
      properties:
        pairCode:
          type: string
        deviceLabel:
          type: [string, 'null']
    PairClaimResponse:
      type: object
      required: [paired, token, apiBaseUrl, pairedAtUtc]
      properties:
        paired:
          type: boolean
        token:
          type: string
        apiBaseUrl:
          type: string
        pairedAtUtc:
          type: string
          format: date-time
    IngestionCreateAccepted:
      type: object
      required: [ingestionId, normalizedLink, state, metadata]
      properties:
        ingestionId:
          type: integer
          format: int64
        normalizedLink:
          type: string
        state:
          type: string
        metadata:
          type: object
          properties:
            artist:
              type: [string, 'null']
            title:
              type: [string, 'null']
            charter:
              type: [string, 'null']
    QueueListResponse:
                  librarySource:
                    type: [string, 'null']
                    description: Library classification source echoed from the request.
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/IngestionQueueItem'
    SingleItemResponse:
      type: object
      required: [item]
      properties:
        item:
          $ref: '#/components/schemas/IngestionQueueItem'
    IngestionQueueItem:
      type: object
      required:
        [
          IngestionId,
          Source,
          SourceLink,
          DisplayName,
          DesktopState,
          CurrentState,
          UpdatedAtUtc,
          Checked,
          UpdatedText,
          CanInstall
        ]
      properties:
        IngestionId:
          type: integer
          format: int64
        Source:
          type: string
        SourceId:
          type: [string, 'null']
        SourceLink:
          type: string
        Artist:
          type: [string, 'null']
        Title:
          type: [string, 'null']
        Charter:
          type: [string, 'null']
        DisplayName:
                  LibrarySource:
                    type: [string, 'null']
                    description: Library classification source (rhythmverse, encore).
                      librarySource:
                        type: boolean
          type: string
        DesktopState:
          type: string
        CurrentState:
          type: string
        DownloadedLocation:
          type: [string, 'null']
        InstalledLocation:
          type: [string, 'null']
        IsInDesktopLibrary:
          type: boolean
        DesktopLibraryPath:
          type: [string, 'null']
        UpdatedAtUtc:
          type: string
          format: date-time
        Checked:
          type: boolean
        UpdatedText:
          type: string
        CanInstall:
          type: boolean
    EventAccepted:
      type: object
      required: [ingestionId, fromState, toState]
      properties:
        ingestionId:
          type: integer
          format: int64
        fromState:
          type: string
        toState:
          type: string
    RetryAccepted:
      type: object
      required: [ingestionId, action, correlationId]
      properties:
        ingestionId:
          type: integer
          format: int64
        action:
          type: string
          example: retry
        correlationId:
          type: string
          format: uuid
          description: Correlation ID for tracing this action request in logs/client telemetry.
        fromState:
          type: [string, 'null']
        toState:
          type: [string, 'null']
        state:
          type: [string, 'null']
        noop:
          type: [boolean, 'null']
    InstallAccepted:
      type: object
      required: [ingestionId, action, installedDirectories, desktopState, correlationId]
      properties:
        ingestionId:
          type: integer
          format: int64
        action:
          type: string
          example: install
        correlationId:
          type: string
          format: uuid
          description: Correlation ID for tracing this action request in logs/client telemetry.
        installedDirectories:
          type: array
          items:
            type: string
        desktopState:
          type: string
        desktopPath:
          type: [string, 'null']
    OpenFolderAccepted:
      type: object
      required: [ingestionId, action, directory, correlationId]
      properties:
        ingestionId:
          type: integer
          format: int64
        action:
          type: string
          example: open-folder
        correlationId:
          type: string
          format: uuid
          description: Correlation ID for tracing this action request in logs/client telemetry.
        directory:
          type: string

security:
  - SyncTokenHeader: []
  - BearerAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      security: []
      responses:
        '200':
          description: API host is up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/version:
    get:
      tags: [Metadata]
      summary: API contract metadata and capability flags
      operationId: getVersion
      responses:
        '200':
          description: Version metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/pair/claim:
    post:
      tags: [Pairing]
      summary: Exchange pair code for sync token
      description: |
        On success, the desktop host rotates the pair code immediately and records pairing audit metadata
        in runtime settings (last paired device/time and rolling recent pairing history).
      operationId: claimPairCode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PairClaimRequest'
      responses:
        '200':
          description: Pairing accepted and token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PairClaimResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid pair code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '410':
          description: Pair code expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '408':
          description: Request body read timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Content-Type must be application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ingestions:
    get:
      tags: [Ingestions]
      summary: Query ingestion queue items
      operationId: listIngestions
      parameters:
        - $ref: '#/components/parameters/StateFilter'
        - $ref: '#/components/parameters/SourceFilter'
        - $ref: '#/components/parameters/SortField'
        - $ref: '#/components/parameters/SortDesc'
        - $ref: '#/components/parameters/ListLimit'
      responses:
        '200':
          description: Matching items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueListResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: JSON body exceeds 64 KiB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Sync API mutation queue is busy; retry later
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Ingestions]
      summary: Create or update ingestion record
      operationId: upsertIngestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestionSyncRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionCreateAccepted'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '408':
          description: Request body read timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Content-Type must be application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ingestions/{id}:
    get:
      tags: [Ingestions]
      summary: Get a single ingestion by id
      operationId: getIngestionById
      parameters:
        - $ref: '#/components/parameters/IngestionId'
      responses:
        '200':
          description: Item found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SingleItemResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ingestion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ingestions/{id}/events:
    post:
      tags: [Ingestions]
      summary: Record an ingestion state transition event
      operationId: postIngestionEvent
      parameters:
        - $ref: '#/components/parameters/IngestionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestionEventRequest'
      responses:
        '202':
          description: Event accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccepted'
        '400':
          description: Invalid payload or invalid transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '408':
          description: Request body read timed out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Content-Type must be application/json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ingestion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: fromState mismatch conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: JSON body exceeds 64 KiB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Sync API mutation queue is busy; retry later
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ingestions/{id}/actions/retry:
    post:
      tags: [Actions]
      summary: Retry ingestion by moving state back to queued
      operationId: retryIngestion
      parameters:
        - $ref: '#/components/parameters/IngestionId'
      responses:
        '202':
          description: Retry accepted (or noop when already queued)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetryAccepted'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ingestion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Retry not valid for current state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Sync API mutation queue is busy; retry later
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ingestions/{id}/actions/install:
    post:
      tags: [Actions]
      summary: Install latest downloaded asset for ingestion
      operationId: installIngestion
      parameters:
        - $ref: '#/components/parameters/IngestionId'
      responses:
        '202':
          description: Install accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstallAccepted'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ingestion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Missing/invalid downloaded asset or install output
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Sync API mutation queue is busy; retry later
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/ingestions/{id}/actions/open-folder:
    post:
      tags: [Actions]
      summary: Open installed folder or downloaded parent folder
      operationId: openIngestionFolder
      parameters:
        - $ref: '#/components/parameters/IngestionId'
      responses:
        '202':
          description: Folder open accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenFolderAccepted'
        '401':
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Ingestion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: No openable folder available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Sync API mutation queue is busy; retry later
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
