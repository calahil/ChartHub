services:
  db:
    image: postgres:17.0-alpine
    container_name: ${PSQL_CONTAINER_NAME:-charthub-postgres}
    environment:
      - POSTGRES_USER=${PSQL_USER}
      - POSTGRES_PASSWORD=${PSQL_PASSWORD}
      - POSTGRES_DB=${PSQL_DB}
      - TZ=Etc/UTC
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "${PSQL_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      #- ./backup:/backup
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
      - CMD-SHELL
      - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
    restart: always
    networks:
      - internal_env

  backup-api:
    image: ${BACKUP_API_IMAGE:-charthub-backup-api:local}
    build:
      context: .
      dockerfile: ChartHub.BackupApi/Dockerfile
    container_name: ${BACKUP_API_CONTAINER_NAME:-charthub-backup-api}
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - Database__Provider=postgresql
      - Database__PostgreSqlConnectionString=Host=${PSQL_CONTAINER_NAME:-charthub-postgres};Port=5432;Database=${PSQL_DB};Username=${PSQL_USER};Password=${PSQL_PASSWORD}
      - RhythmVerseSource__BaseUrl=${RHYTHMVERSE_BASE_URL:-https://rhythmverse.co/}
      - RhythmVerseSource__Token=${RHYTHMVERSE_TOKEN:-CHANGE_ME}
      - Sync__Enabled=${BACKUP_SYNC_ENABLED:-true}
      - Sync__InitialDelayMinutes=${BACKUP_SYNC_INITIAL_DELAY_MINUTES:-0}
      - Downloads__Mode=${BACKUP_DOWNLOADS_MODE:-redirect}
      - Downloads__CacheDirectory=/cache/downloads
      - Downloads__ExternalRedirectCacheHours=${BACKUP_DOWNLOADS_EXTERNAL_REDIRECT_CACHE_HOURS:-48}
      - ImageCache__CacheDirectory=/cache/images
    ports:
      - "${API_PORT:-5147}:5000"
    volumes:
      - ${BACKUP_DOWNLOADS_HOST_PATH:-./ChartHub.BackupApi/cache/downloads}:/cache/downloads
      - ${BACKUP_IMAGES_HOST_PATH:-./ChartHub.BackupApi/cache/images}:/cache/images
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:5000/api/rhythmverse/health/sync || exit 1
      timeout: 5s
    restart: always
    networks:
      - internal_env

  charthub-server:
    image: ${CHARTHUB_SERVER_IMAGE:-charthub-server:local}
    container_name: ${CHARTHUB_SERVER_CONTAINER_NAME:-charthub-server}
    environment:
      - ASPNETCORE_ENVIRONMENT=${CHARTHUB_SERVER_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=http://+:5001
      - Auth__JwtSigningKey=${CHARTHUB_SERVER_JWT_SIGNING_KEY:-CHANGE_ME_WITH_A_32_CHAR_MINIMUM_SECRET}
      - Auth__Issuer=${CHARTHUB_SERVER_JWT_ISSUER:-charthub-server}
      - Auth__Audience=${CHARTHUB_SERVER_JWT_AUDIENCE:-charthub-clients}
      - Auth__AllowedEmails__0=${CHARTHUB_SERVER_ALLOWED_EMAIL_0:-}
      - GoogleAuth__AllowedAudiences__0=${CHARTHUB_SERVER_ALLOWED_AUDIENCE_0:-}
      - GoogleDrive__ApiKey=${CHARTHUB_SERVER_GOOGLE_DRIVE_API_KEY:-}
      - ServerPaths__ConfigRoot=/config
      - ServerPaths__ChartHubRoot=/charthub
      - ServerPaths__DownloadsDir=/charthub/downloads
      - ServerPaths__StagingDir=/charthub/staging
      - ServerPaths__CloneHeroRoot=/clonehero
      - ServerPaths__SqliteDbPath=/config/charthub-server.db
    ports:
      - "${CHARTHUB_SERVER_PORT:-5180}:5001"
    volumes:
      - ${CHARTHUB_SERVER_CONFIG_PATH:-./dev-data/config}:/config
      - ${CHARTHUB_SERVER_CHARTHUB_PATH:-./dev-data/charthub}:/charthub
      - ${CHARTHUB_SERVER_CLONEHERO_PATH:-./dev-data/clonehero}:/clonehero
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
      - CMD-SHELL
      - wget --spider -q http://localhost:5001/health || exit 1
      timeout: 5s
    restart: always
    networks:
      - internal_env

networks:
  internal_env:
    external: true
    name: ${INTERNAL}

volumes:
  db_data:
    external: true
    name: ${DB_VOLUME:-charthub-data}